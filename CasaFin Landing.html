<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CasaFin — Endlich Überblick über dein Geld</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;550;600;650;700;750;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --font-ui:"Hanken Grotesk",-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,monospace;
  --bg:#F4F4EF; --bg2:#EDEEE7; --surface:#FFFFFF; --surface2:#F6F6F1;
  --ink:#14161A; --ink2:#565B63; --ink3:#8B9098; --line:#E4E4DC; --line2:#D7D8CE;
  --brand:#0B8F92; --brand2:#0A7479; --brand-ink:#075257; --brand-soft:#E0F1F1; --brand-glow:rgba(11,143,146,.18);
  --gold:#C2862A; --gold-soft:#F8F0DB;
  --r-sm:12px; --r-md:16px; --r-lg:22px; --r-xl:30px; --pill:999px;
  --shadow-md:0 4px 16px rgba(20,22,26,.07),0 1px 3px rgba(20,22,26,.05);
  --shadow-lg:0 30px 70px -18px rgba(20,22,26,.28),0 10px 24px rgba(20,22,26,.10);
  --maxw:1140px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-ui);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55;font-feature-settings:"ss01";overflow-x:hidden}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.mono{font-family:var(--font-mono)}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}
.eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--brand-ink)}
em{font-style:normal;color:var(--brand)}

/* lang toggle */
[data-lang="de"] .en-only{display:none}
[data-lang="en"] .de-only{display:none}

/* nav */
.nav{position:sticky;top:0;z-index:50;background:rgba(244,244,239,.82);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px)}
.nav-in{display:flex;align-items:center;gap:14px;height:66px}
.brand{display:flex;align-items:center;gap:11px}
.mark{width:36px;height:36px;border-radius:11px;background:#0e1315;display:grid;place-items:center;box-shadow:0 10px 24px -8px var(--brand-glow);overflow:hidden}
.mark img{width:100%;height:100%;object-fit:cover}
.mark svg{width:20px;height:20px}
.bname{font-weight:750;font-size:18px;letter-spacing:-.02em}
.bname b{color:var(--brand)}
.nav-links{display:flex;gap:6px;margin-left:18px}
.nav-links a{padding:8px 12px;border-radius:10px;font-size:14px;font-weight:600;color:var(--ink2)}
.nav-links a:hover{background:var(--surface2);color:var(--ink)}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.seg{display:inline-flex;background:var(--surface2);border:1px solid var(--line);border-radius:var(--pill);padding:3px}
.seg button{padding:5px 11px;border-radius:var(--pill);font-size:12.5px;font-weight:650;color:var(--ink3);border:none;background:none;cursor:pointer}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-md)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:650;font-size:14.5px;padding:11px 18px;border-radius:var(--r-sm);border:1px solid transparent;cursor:pointer;transition:transform .2s,background .2s,box-shadow .2s;white-space:nowrap}
.btn svg{width:17px;height:17px}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 12px 30px -10px var(--brand-glow)}
.btn-primary:hover{background:var(--brand2);transform:translateY(-1px)}
.btn-ghost{background:var(--surface);border-color:var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--line2);transform:translateY(-1px)}
.btn-gold{background:linear-gradient(150deg,#DCA346,#B57C22);color:#fff}
.btn-lg{padding:14px 24px;font-size:15.5px}
.nav .btn{padding:9px 15px;font-size:13.5px}

/* hero */
.hero{position:relative;padding:64px 0 40px;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(900px 540px at 80% -8%,var(--brand-glow),transparent 60%);pointer-events:none}
.hero-in{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}
.hero h1{font-size:54px;line-height:1.04;font-weight:780;letter-spacing:-.035em;margin:14px 0 24px}
.hero p.lead{font-size:18px;color:var(--ink2);max-width:42ch;margin-bottom:26px}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap}
.trust-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:24px}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:6px 11px;border-radius:var(--pill);background:var(--surface);border:1px solid var(--line);color:var(--ink2)}
.chip svg{width:13px;height:13px;color:var(--brand)}
.chip.mono{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em}

/* browser frame */
.frame{border-radius:16px;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-lg);overflow:hidden}
.frame-bar{display:flex;align-items:center;gap:7px;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--surface2)}
.frame-bar i{width:11px;height:11px;border-radius:50%;background:var(--line2)}
.frame-bar .url{margin-left:12px;font-family:var(--font-mono);font-size:11px;color:var(--ink3);background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:3px 10px}
.frame img{width:100%;display:block}
.hero-frame{transform:none}

/* sections */
section{padding:64px 0}
.sec-head{text-align:center;max-width:640px;margin:0 auto 44px}
.sec-head h2{font-size:38px;font-weight:760;letter-spacing:-.03em;line-height:1.08;margin:10px 0}
.sec-head p{font-size:16px;color:var(--ink2)}

/* trust band */
.band{background:linear-gradient(160deg,var(--brand2),#073f38);color:#fff;border-radius:var(--r-xl);padding:34px 40px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;position:relative;overflow:hidden}
.band::after{content:none}
.band .lock{width:58px;height:58px;border-radius:16px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);display:grid;place-items:center;flex-shrink:0;position:relative;z-index:1}
.band .lock svg{width:28px;height:28px}
.band h3{font-size:23px;font-weight:740;letter-spacing:-.02em;position:relative;z-index:1}
.band p{color:rgba(255,255,255,.8);font-size:14.5px;margin-top:4px;position:relative;z-index:1;max-width:60ch}

/* outcomes */
.cards-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.ocard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:26px}
.ocard .ic{width:52px;height:52px;border-radius:50%;display:grid;place-items:center;background:var(--brand-soft);border:1.5px solid color-mix(in oklab,var(--brand),transparent 55%);margin-bottom:16px;color:var(--brand);position:relative}
.ocard .ic::after{content:"";position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 3px var(--bg)}
.ocard .ic svg{width:26px;height:26px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.ocard h3{font-size:19px;font-weight:720;letter-spacing:-.01em}
.ocard p{font-size:14.5px;color:var(--ink2);margin-top:8px}
.ocard .metric{margin-top:14px;font-size:13px;font-weight:700;color:var(--brand-ink)}
.agent-chip{display:flex;flex-direction:column;padding:12px 15px;border-radius:12px;background:var(--surface);border:1px solid var(--line)}
.agent-chip b{font-size:14px;font-weight:700;color:var(--brand-ink)}
.agent-chip span{font-size:12.5px;color:var(--ink2);margin-top:2px}
.save-pill{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink2);background:var(--brand-soft);border:1px solid color-mix(in oklab,var(--brand),transparent 70%);padding:8px 14px;border-radius:999px}
.save-pill b{color:var(--brand-ink);font-weight:750}
.fina-chat-dark{background:#0C1413!important;border-color:#1c2423!important}
.fina-chat-dark > div[style*="flex-start"]{background:#161d1c!important;border-color:#283230!important;color:#E6ECEB!important}

/* feature rows */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;margin-bottom:56px}
.frow:nth-child(even) .ftext{order:2}
.ftext .eyebrow{margin-bottom:10px;display:block}
.ftext h3{font-size:30px;font-weight:750;letter-spacing:-.025em;line-height:1.1}
.ftext p{font-size:16px;color:var(--ink2);margin:14px 0 18px;max-width:46ch}
.ftext ul{list-style:none;display:grid;gap:9px}
.ftext li{display:flex;align-items:center;gap:10px;font-size:14.5px;font-weight:550;color:var(--ink)}
.ftext li svg{width:18px;height:18px;color:var(--brand);flex-shrink:0}

/* security */
.security{background:linear-gradient(165deg,#0C1413,#070b0a);color:#fff;border-radius:var(--r-xl);padding:52px;display:grid;grid-template-columns:1.1fr 1fr;gap:44px;align-items:center;position:relative;overflow:hidden}
.security::after{content:"";position:absolute;inset:0;background:radial-gradient(600px 400px at 12% 10%,var(--brand-glow),transparent 60%);pointer-events:none}
.security .eyebrow{color:var(--brand)}
.security h2{font-size:34px;font-weight:760;letter-spacing:-.03em;margin:10px 0 16px;line-height:1.1}
.security ul{list-style:none;display:grid;gap:14px;margin-top:6px}
.security li{display:flex;gap:13px;align-items:flex-start;position:relative;z-index:1}
.security li .ic{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);display:grid;place-items:center;flex-shrink:0}
.security li .ic svg{width:18px;height:18px;color:var(--brand)}
.security li b{font-size:15px;font-weight:680}
.security li span{display:block;font-size:13px;color:rgba(255,255,255,.66);margin-top:2px}
.security .frame{border:1px solid rgba(255,255,255,.12)}

/* pricing */
.pio-bar{display:flex;align-items:center;gap:16px;background:var(--gold-soft);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:26px;flex-wrap:wrap}
.pio-bar .k{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
.pio-bar .barwrap{flex:1;min-width:160px}
.pio-bar .track{height:8px;border-radius:99px;background:#0001;overflow:hidden}
.pio-bar .track i{display:block;height:100%;width:8%;background:var(--gold);border-radius:99px;transition:width 1.1s cubic-bezier(.22,1,.36,1)}
.pio-count{font-size:12.5px;color:var(--ink2)}
.pio-count b{color:var(--brand);font-size:15.5px;font-weight:750;font-family:var(--font-mono);display:inline-block}
.pio-live{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:11px;letter-spacing:.03em;color:var(--brand-ink);background:var(--brand-soft);padding:5px 11px;border-radius:99px;white-space:nowrap}
.pio-live b{color:var(--brand);font-weight:700}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--brand);animation:livePulse 1.8s infinite}
@keyframes livePulse{0%{box-shadow:0 0 0 0 rgba(11,143,146,.5)}70%{box-shadow:0 0 0 8px rgba(11,143,146,0)}100%{box-shadow:0 0 0 0 rgba(11,143,146,0)}}
.pio-count b.pio-flash{animation:pioFlash .9s ease}
@keyframes pioFlash{0%{transform:translateY(-3px) scale(1.25);color:#0A7479}55%{transform:translateY(0) scale(1.08)}100%{transform:none;color:var(--brand)}}
.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.plan{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:26px;position:relative}
.plan.pop{border-color:var(--brand);box-shadow:0 0 0 1px var(--brand)}
.plan .tag{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--brand);color:#fff;font-size:11px;font-weight:700;padding:3px 11px;border-radius:99px}
.plan h3{font-size:17px;font-weight:720}
.plan .price{font-size:34px;font-weight:780;letter-spacing:-.03em;margin:10px 0 4px}
.plan .price small{font-size:14px;font-weight:600;color:var(--ink3)}
.plan ul{list-style:none;display:grid;gap:9px;margin:16px 0 20px}
.plan li{display:flex;gap:9px;font-size:13.5px;color:var(--ink2);align-items:center}
.plan li svg{width:15px;height:15px;color:var(--brand);flex-shrink:0}

/* final cta */
.final{text-align:center;background:linear-gradient(160deg,var(--brand2),#073f38);color:#fff;border-radius:var(--r-xl);padding:60px 40px;position:relative;overflow:hidden}
.final::after{content:none}
.final h2{font-size:40px;font-weight:780;letter-spacing:-.03em;position:relative;z-index:1}
.final p{color:rgba(255,255,255,.8);font-size:16px;margin:14px auto 26px;max-width:50ch;position:relative;z-index:1}
.final .hero-cta{justify-content:center;position:relative;z-index:1}
.final .btn-ghost{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.22);color:#fff}
.final .btn-primary{background:#fff;color:var(--brand2)}

/* footer */
footer{padding:40px 0;border-top:1px solid var(--line);color:var(--ink3);font-size:13px}
.foot-in{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.foot-in a{color:var(--ink2);font-weight:600}
.foot-in .sp{margin-left:auto}

@media(max-width:900px){
  .hero-in,.frow,.security{grid-template-columns:1fr;gap:28px}
  .frow:nth-child(even) .ftext{order:0}
  .hero h1{font-size:40px}
  .hero-frame{transform:none}
  .cards-3,.plans{grid-template-columns:1fr}
  .fina-grid{grid-template-columns:1fr!important}
  .nav-links{display:none}
  .sec-head h2{font-size:30px}
  .security{padding:32px}
  section{padding:48px 0}
}
</style>
</head>

<script>
(function(){
  var body=document.body;
  function apply(lang){
    body.setAttribute('data-lang',lang);
    document.documentElement.lang=lang;
    document.querySelectorAll('[data-de]').forEach(function(el){
      var v=el.getAttribute('data-'+lang); if(v!=null) el.innerHTML=v;
    });
    document.querySelectorAll('.seg button').forEach(function(b){ b.classList.toggle('on', b.dataset.set===lang); });
  }
  document.querySelectorAll('.seg button').forEach(function(b){ b.addEventListener('click',function(){ apply(b.dataset.set); }); });
  apply('de');
})();
/* Pioneer live counter */
(function(){
  var fill=document.getElementById('pioFill'),takenEl=document.getElementById('pioTaken'),viewEl=document.getElementById('pioView');
  if(!fill||!takenEl) return;
  var taken=16,total=199;
  function render(){ fill.style.width=(taken/total*100)+'%'; takenEl.textContent=taken; }
  render();
  function viewers(){ if(viewEl) viewEl.textContent=8+Math.floor(Math.random()*16); setTimeout(viewers,2600+Math.random()*3600); }
  setTimeout(viewers,3000);
  function tick(){ setTimeout(function(){
    if(taken<total-1){ taken++; render(); takenEl.classList.remove('pio-flash'); void takenEl.offsetWidth; takenEl.classList.add('pio-flash'); }
    tick();
  },14000+Math.random()*20000); }
  tick();
})();
</script>
