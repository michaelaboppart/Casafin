  <script type="text/babel" data-presets="react">
/* ============================================================
   CasaFin — Documents & OCR
   ============================================================ */
const { useState: useStateD, useRef: useRefD } = React;

function kindIcon(kind) { return { tax: "📋", invoice: "🧾", insurance: "🏥", contract: "📄", receipt: "🛒" }[kind] || "📄"; }

function mockExtract(name) {
  const lower = name.toLowerCase();
  const vendors = ["AXA", "Swisscard", "Swisscom", "ZKB", "Coop", "Helsana", "Kt. Zürich"];
  const vendor = vendors.find((v) => lower.includes(v.toLowerCase())) || vendors[Math.floor(Math.random() * vendors.length)];
  const amount = "CHF " + (Math.floor(Math.random() * 900) + 80) + ".00";
  const kind = /steuer|tax/.test(lower) ? "tax" : /kranken|insur|axa|helsana/.test(lower) ? "insurance" : "invoice";
  const due = new Date(Date.now() + (Math.floor(Math.random() * 40) + 5) * 864e5).toISOString().slice(0, 10);
  return { vendor, amount: kind === "tax" ? "—" : amount, due, category: kind === "tax" ? "Steuern" : kind === "insurance" ? "Versicherung" : "Rechnung", kind };
}

function Documents({ lang }) {
  const T = (k) => window.I18N.t(k, lang);
  const d = window.Vault.data, F = window.fmt;
  const [drag, setDrag] = useStateD(false);
  const fileRef = useRefD(null);

  function handleFiles(files) {
    [...files].forEach((file) => {
      const id = "d" + Date.now() + Math.floor(Math.random() * 999);
      const ex = mockExtract(file.name);
      window.Vault.update((data) => {
        data.documents.unshift({ id, name: file.name, kind: ex.kind, size: (file.size / 1048576).toFixed(1) + " MB",
          date: new Date().toISOString().slice(0, 10), status: "processing", fields: ex });
        window.Vault.log("document.uploaded", file.name);
      });
      setTimeout(() => {
        window.Vault.update((data) => {
          const doc = data.documents.find((x) => x.id === id);
          if (doc) doc.status = "done";
          window.Vault.log("document.analyzed", file.name + " · OCR");
        });
      }, 2200);
    });
  }

  const processed = d.documents.filter((x) => x.status === "done").length;

  return (
    <div className="animate">
      <div className={"dropzone" + (drag ? " over" : "")}
        onClick={() => fileRef.current.click()}
        onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={(e) => { e.preventDefault(); setDrag(false); handleFiles(e.dataTransfer.files); }}>
        <input ref={fileRef} type="file" multiple accept=".pdf,.jpg,.jpeg,.png" style={{ display: "none" }}
          onChange={(e) => { handleFiles(e.target.files); e.target.value = ""; }} />
        <div className="dz-icon"><Icon name="upload" size={26} /></div>
        <div style={{ fontWeight: 680, fontSize: 16 }}>{T("docs.upload")}</div>
        <div style={{ fontSize: 13.5, color: "var(--ink-2)", marginTop: 4 }}>{T("docs.dropHint")}</div>
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <span className="chip">{lang === "de" ? "Rechnungen" : "Invoices"}</span>
          <span className="chip">{lang === "de" ? "Quittungen" : "Receipts"}</span>
          <span className="chip">{lang === "de" ? "Steuerdokumente" : "Tax docs"}</span>
        </div>
        <div className="seclabel" style={{ marginTop: 16 }}><Icon name="lock" size={12} /> {T("docs.encNote")}</div>
      </div>

      <div className="card card-pad" style={{ marginTop: 18 }}>
        <div className="card-h"><h3>{T("docs.processed")}</h3><span className="nav-badge" style={{ marginLeft: "auto" }}>{d.documents.length}</span></div>
        <div style={{ display: "grid", gap: 12 }}>
          {d.documents.map((doc) => (
            <div className="doc-card" key={doc.id}>
              <div className="ic" style={{ fontSize: 19 }}>{kindIcon(doc.kind)}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="nm" style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{doc.name}</div>
                <div className="sub">{F.date(doc.date, lang)} · {doc.size}</div>
                {doc.status === "done" && (
                  <div className="doc-fields">
                    <span><b>{T("docs.vendor")}:</b> {doc.fields.vendor}</span>
                    <span><b>{T("docs.amount")}:</b> {doc.fields.amount}</span>
                    <span><b>{T("docs.due")}:</b> {F.date(doc.fields.due, lang)}</span>
                    <span className="chip" style={{ fontSize: 10.5, padding: "2px 8px" }}>{doc.fields.category}</span>
                  </div>
                )}
              </div>
              <div style={{ alignSelf: "flex-start" }}>
                {doc.status === "done"
                  ? <span className="chip pos"><Icon name="check" size={12} /> {T("docs.analyzed")}</span>
                  : <span className="chip" style={{ color: "var(--warn)" }}><Icon name="refresh" size={12} style={{ animation: "ringSpin 1s linear infinite" }} /> {T("docs.processing")}</span>}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

window.Documents = Documents;

  </script>

  <script type="text/babel" data-presets="react">
/* ============================================================
   CasaFin — Agents
   ============================================================ */
const { useState: useStateG } = React;

const AGENT_ICON = { CT: "docs", CD: "upload", CB: "budget", CM: "bell", CP: "send", CF: "family" };

function Agents({ lang }) {
  const T = (k) => window.I18N.t(k, lang);
  const d = window.Vault.data;
  const [pulse, setPulse] = useStateG(null);

  function toggle(id) {
    window.Vault.update((data) => {
      const a = data.agents.find((x) => x.id === id);
      a.status = a.status === "paused" ? "running" : "paused";
      window.Vault.log("agent.toggled", a.name + " → " + a.status);
    });
  }
  function run(id) {
    setPulse(id);
    window.Vault.logPersist("agent.run", d.agents.find((x) => x.id === id).name);
    setTimeout(() => setPulse(null), 1200);
  }

  const active = d.agents.filter((a) => a.status === "running").length;

  return (
    <div className="animate">
      <div className="grid cols-3">
        {d.agents.map((a) => {
          const running = a.status === "running";
          return (
            <div className={"card card-pad agent-card" + (pulse === a.id ? " pulse" : "")} key={a.id}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 12, marginBottom: 14 }}>
                <div className="agent-badge"><Icon name={AGENT_ICON[a.code]} size={19} /></div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span className="mono" style={{ fontSize: 11, color: "var(--ink-3)", fontWeight: 600 }}>{a.code}</span>
                    <span style={{ fontWeight: 720, fontSize: 15 }}>{a.name}</span>
                  </div>
                  <div style={{ fontSize: 12.5, color: "var(--ink-2)", marginTop: 2 }}>{lang === "de" ? a.role : a.roleEn}</div>
                </div>
                <span className={"agent-status " + (running ? "on" : "off")}>{running ? <><span className="dot" /> {T("agents.running")}</> : T("agents.paused")}</span>
              </div>

              <div className="agent-meta">
                <div><div className="am-k">{T("agents.lastRun")}</div><div className="am-v">{lang === "de" ? a.lastRun : a.lastRunEn}</div></div>
                <div><div className="am-k">{T("agents.found")}</div><div className="am-v" style={{ color: "var(--brand)" }}>{lang === "de" ? a.found : a.foundEn}</div></div>
              </div>

              <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                <button className="btn btn-ghost" style={{ flex: 1, padding: "9px 12px", fontSize: 13 }} onClick={() => run(a.id)}>
                  <Icon name="refresh" size={15} style={pulse === a.id ? { animation: "ringSpin 1s linear infinite" } : null} /> {T("agents.run")}
                </button>
                <Toggle on={running} onChange={() => toggle(a.id)} />
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

window.Agents = Agents;

  </script>

function SetRow({ icon, title, sub, children, danger }) {

}

function Settings({ lang, setLang, theme, setTheme, accent, setAccent, customColor, setCustomColor, onLock }) {
  const T = (k) => window.I18N.t(k, lang);
  const d = window.Vault.data, F = window.fmt;
  const [pwModal, setPwModal] = useStateS(false);
  const [auditOpen, setAuditOpen] = useStateS(false);
  const [old, setOld] = useStateS(""); const [n1, setN1] = useStateS(""); const [n2, setN2] = useStateS("");
  const [pwErr, setPwErr] = useStateS(""); const [pwOk, setPwOk] = useStateS(false);
  const [twoFa, setTwoFa] = useStateS(d.settings.twoFa);
  const [autoLock, setAutoLock] = useStateS(d.settings.autoLockMin);
  const [editName, setEditName] = useStateS(false);
  const [nameVal, setNameVal] = useStateS(d.profile.name);
  function saveName() {
    const nm = nameVal.trim(); if (!nm) { setEditName(false); return; }
    window.Vault.update((data) => {
      data.profile.name = nm;
      data.profile.initials = nm.split(/\s+/).map((w) => w[0]).slice(0, 2).join("").toUpperCase();
      window.Vault.log("profile.renamed", nm);
    });
    setEditName(false);
  }

  async function changePw() {
    setPwErr("");
    if (n1.length < 8) return setPwErr(T("sec.tooShort"));
    if (n1 !== n2) return setPwErr(T("sec.mismatch"));
    const ok = await window.Vault.changePassword(old, n1);
    if (!ok) return setPwErr(T("sec.wrong"));
    setPwOk(true);
    setTimeout(() => { setPwModal(false); setPwOk(false); setOld(""); setN1(""); setN2(""); }, 1100);
  }
  function setTwoFaV(v) { setTwoFa(v); window.Vault.update((data) => { data.settings.twoFa = v; window.Vault.log("2fa.toggled", v ? "aktiviert" : "deaktiviert"); }); }
  function setLockV(v) { setAutoLock(v); window.Vault.update((data) => { data.settings.autoLockMin = v; }); }

  function exportData() {
    const blob = new Blob([localStorage.getItem("casafin.vault.v1")], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "casafin-encrypted-backup.json"; a.click();
    URL.revokeObjectURL(url);
    window.Vault.logPersist("data.exported", "Verschlüsseltes Backup");
  }
  function wipe() {
    if (confirm(T("set.wipeConfirm"))) window.Vault.wipe();

            <SetRow icon="key" title={T("set.changePw")} sub={T("sec.encrypted")}>
              <button className="btn btn-ghost" style={{ padding: "8px 14px", fontSize: 13 }} onClick={() => setPwModal(true)}>{T("common.save")}</button>
            </SetRow>
            <SetRow icon="lock" title={T("set.twoFa")} sub={twoFa ? T("set.on") : T("set.off")}>
              <Toggle on={twoFa} onChange={setTwoFaV} />
            </SetRow>
            <SetRow icon="unlock" title={T("set.autoLock")} sub={T("set.autoLockSub")}>
              <select className="input" style={{ width: "auto", padding: "8px 12px" }} value={autoLock} onChange={(e) => setLockV(+e.target.value)}>
                {[1, 5, 15, 30].map((m) => <option key={m} value={m}>{m} {T("set.mins")}</option>)}
              </select>
            </SetRow>
            <SetRow icon="eye" title={T("set.audit")} sub={(d.audit?.length || 0) + " " + (lang === "de" ? "Einträge" : "entries")}>
              <button className="btn btn-ghost" style={{ padding: "8px 14px", fontSize: 13 }} onClick={() => setAuditOpen(true)}>{T("common.details")}</button>
            </SetRow>
            <div style={{ marginTop: 6 }}>
              <button className="btn btn-ghost btn-block" onClick={onLock}><Icon name="lock" size={16} /> {T("sec.lock")}</button>
            </div>
          </div>

          {/* Data */}
          <div className="card card-pad">
            <div className="card-h"><div className="set-ic" style={{ width: 30, height: 30 }}><Icon name="download" size={16} /></div><h3>{T("set.data")}</h3></div>
            <SetRow icon="refresh" title={T("set.clearDemo")} sub={T("set.clearDemoSub")}>
              <button className="btn btn-ghost" style={{ padding: "8px 14px", fontSize: 13 }} onClick={clearDemo}>{T("common.delete")}</button>
            </SetRow>
            <SetRow icon="download" title={T("set.export")} sub={T("set.exportSub")}>
              <button className="btn btn-ghost" style={{ padding: "8px 14px", fontSize: 13 }} onClick={exportData}>{T("set.export")}</button>
            </SetRow>
            <SetRow icon="trash" title={T("set.wipe")} sub={T("set.wipeSub")} danger>
              <button className="btn btn-ghost" style={{ padding: "8px 14px", fontSize: 13, color: "var(--neg)", borderColor: "var(--danger-soft)" }} onClick={wipe}>{T("common.delete")}</button>
            </SetRow>
          </div>
        </div>

        <div className="grid">

        footer={<><button className="btn btn-ghost" onClick={() => setPwModal(false)}>{T("common.cancel")}</button>
          <button className="btn btn-primary" onClick={changePw}>{pwOk ? <><Icon name="check" size={16} /> OK</> : T("common.save")}</button></>}>
        <div className="field" style={{ marginBottom: 14 }}><label>{lang === "de" ? "Aktuelles Passwort" : "Current password"}</label><PwField value={old} onChange={setOld} placeholder="••••••••" autoFocus /></div>
        <div className="field" style={{ marginBottom: 14 }}><label>{lang === "de" ? "Neues Passwort" : "New password"}</label><PwField value={n1} onChange={setN1} placeholder="••••••••" /></div>
        <div className="field"><label>{T("sec.masterConfirm")}</label><PwField value={n2} onChange={setN2} placeholder="••••••••" onEnter={changePw} /></div>
        {pwErr && <div className="auth-err" style={{ marginTop: 14, marginBottom: 0 }}>{pwErr}</div>}
      </Modal>

      {/* audit modal */}
      <Modal open={auditOpen} onClose={() => setAuditOpen(false)} title={T("set.audit")} width={520}>
        <div style={{ display: "grid", gap: 2 }}>
          {(d.audit || []).map((e, i) => (
            <div className="audit-row" key={i}>
              <span className="audit-dot" />
              <div style={{ flex: 1 }}>
                <span className="mono" style={{ fontSize: 12, color: "var(--brand-ink)" }}>{e.type}</span>
                <div style={{ fontSize: 12.5, color: "var(--ink-2)" }}>{e.detail}</div>
              </div>
              <span className="mono" style={{ fontSize: 11, color: "var(--ink-3)" }}>{F.timeAgo(e.ts, lang)}</span>
            </div>
          ))}
          {(!d.audit || !d.audit.length) && <div style={{ color: "var(--ink-3)", fontSize: 13, padding: 12 }}>—</div>}
        </div>
      </Modal>
    </div>
  );
}

window.Settings = Settings;

  </script>

  <script type="text/babel" data-presets="react">
/* ============================================================
   CasaFin — Money tools: Bills · Subscriptions · Goals
   ============================================================ */
const { useState: useStateM } = React;

function daysUntil(due) {
  const now = new Date(); now.setHours(0, 0, 0, 0);
  return Math.round((new Date(due) - now) / 86400000);
}
function dueLabel(due, lang, T) {
  const dd = daysUntil(due);
  if (dd < 0) return { txt: Math.abs(dd) + " " + T("bills.days") + " " + T("bills.overdue"), tone: "neg" };
  if (dd === 0) return { txt: T("bills.today"), tone: "neg" };
  if (dd <= 5) return { txt: T("bills.dueIn") + " " + dd + " " + T("bills.days"), tone: "warn" };
  return { txt: T("bills.dueIn") + " " + dd + " " + T("bills.days"), tone: "" };
}

/* ===================== Bills ===================== */
const QR_VENDORS = [["Sunrise GmbH", "Telecom", "📶"], ["Helsana", "Versicherung", "🏥"], ["SBB CFF FFS", "Transport", "🚆"], ["Coop Rechtsschutz", "Versicherung", "🛡️"], ["Stadt Zürich", "Gebühren", "🏛️"]];

function Bills({ lang }) {
  const T = (k) => window.I18N.t(k, lang);
  const d = window.Vault.data, S = window.Vault.sel, F = window.fmt;
  const [scan, setScan] = useStateM(false);
  const [scanning, setScanning] = useStateM(false);
  const [addOpen, setAddOpen] = useStateM(false);
  const [form, setForm] = useStateM({ vendor: "", amount: "", due: new Date(Date.now() + 14 * 864e5).toISOString().slice(0, 10), category: "Rechnung" });

  const sorted = [...d.bills].sort((a, b) => (a.status === b.status ? a.due.localeCompare(b.due) : a.status === "open" ? -1 : 1));
  const next = S.nextBill();

  function markPaid(id) {
    window.Vault.update((data) => { const b = data.bills.find((x) => x.id === id); if (b) b.status = "paid"; window.Vault.log("bill.paid", b.vendor + " · " + b.amount); });
  }
  function doScan() {
    setScanning(true);
    setTimeout(() => {
      const [vendor, category, icon] = QR_VENDORS[Math.floor(Math.random() * QR_VENDORS.length)];
      window.Vault.update((data) => {
        data.bills.unshift({ id: "b" + Date.now(), vendor, amount: Math.round(60 + Math.random() * 540), due: new Date(Date.now() + (7 + Math.floor(Math.random() * 25)) * 864e5).toISOString().slice(0, 10), status: "open", category, icon });
        window.Vault.log("bill.scanned", vendor + " · QR");
      });
      setScanning(false); setScan(false);
    }, 1800);
  }
  function addBill() {
    const amt = parseFloat(String(form.amount).replace(/['’]/g, "")) || 0;
    if (!amt || !form.vendor) return;
    window.Vault.update((data) => {
      data.bills.unshift({ id: "b" + Date.now(), vendor: form.vendor, amount: amt, due: form.due, status: "open", category: form.category, icon: "🧾" });
      window.Vault.log("bill.added", form.vendor);
    });
    setAddOpen(false); setForm({ vendor: "", amount: "", due: new Date(Date.now() + 14 * 864e5).toISOString().slice(0, 10), category: "Rechnung" });
  }

  return (
    <div className="animate">
      <div className="screen-toolbar">
        <span className="seclabel"><Icon name="receipt" size={12} /> {S.billsOpen().length} {T("bills.open")}</span>
        <button className="btn btn-ghost" style={{ marginLeft: "auto" }} onClick={() => setAddOpen(true)}><Icon name="plus" size={16} /> {T("bills.add")}</button>
        <button className="btn btn-primary" style={{ marginLeft: 0 }} onClick={() => setScan(true)}><Icon name="scan" size={16} /> {T("bills.scan")}</button>
      </div>

      <div className="grid cols-3" style={{ marginBottom: 18 }}>
        <div className="stat"><div className="k"><Icon name="receipt" size={15} /> {T("bills.openTotal")}</div><div className="v num" style={{ fontSize: 24, color: "var(--neg)" }}>{F.chf(S.billsOpenTotal())}</div></div>
        <div className="stat"><div className="k"><Icon name="bell" size={15} /> {T("bills.next")}</div>
          {next ? <><div className="v num" style={{ fontSize: 19 }}>{next.vendor}</div><div className="s" style={{ color: dueLabel(next.due, lang, T).tone === "neg" ? "var(--neg)" : "var(--warn)" }}>{F.chf(next.amount)} · {dueLabel(next.due, lang, T).txt}</div></> : <div className="v" style={{ fontSize: 16, color: "var(--brand)" }}>✓</div>}
        </div>
        <div className="stat"><div className="k"><Icon name="check" size={15} /> {T("bills.paid")}</div><div className="v num" style={{ fontSize: 24 }}>{d.bills.filter((b) => b.status === "paid").length}</div></div>
      </div>

      <div className="card card-pad">
        <div className="card-h"><h3>{T("nav.bills")}</h3></div>
        {sorted.length === 0 && <div style={{ padding: 24, textAlign: "center", color: "var(--ink-3)" }}>{T("bills.allPaid")}</div>}
        <div style={{ display: "grid", gap: 10 }}>
          {sorted.map((b) => {
            const dl = dueLabel(b.due, lang, T);
            const paid = b.status === "paid";
            return (
              <div className="bill-row" key={b.id} style={{ opacity: paid ? .62 : 1 }}>
                <div className="ic" style={{ fontSize: 18 }}>{b.icon}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div className="nm">{b.vendor}</div>
                  <div className="sub">{b.category} · {F.date(b.due, lang)}</div>
                </div>
                {!paid && <span className={"chip " + (dl.tone === "neg" ? "neg" : "")} style={{ fontSize: 11, color: dl.tone === "warn" ? "var(--warn)" : undefined }}>{dl.txt}</span>}
                <div className="num" style={{ fontWeight: 740, fontSize: 15.5, minWidth: 92, textAlign: "right" }}>{F.chf(b.amount)}</div>
                {paid ? <span className="chip pos" style={{ fontSize: 11 }}><Icon name="check" size={12} /> {T("bills.paid")}</span>
                  : <button className="btn btn-ghost" style={{ padding: "7px 12px", fontSize: 12.5 }} onClick={() => markPaid(b.id)}><Icon name="check" size={14} /> {T("bills.markPaid")}</button>}
              </div>
            );
          })}
        </div>
      </div>

      <Modal open={scan} onClose={() => !scanning && setScan(false)} title={T("bills.scan")}>
        <div className="scan-frame">
          <div className={"scan-box" + (scanning ? " active" : "")}>
            <Icon name="scan" size={48} />
            {scanning && <div className="scan-line" />}
          </div>
          <p style={{ fontSize: 13, color: "var(--ink-2)", textAlign: "center", marginTop: 16, lineHeight: 1.5 }}>{scanning ? T("bills.scanning") : T("bills.scanHint")}</p>
          {!scanning && <button className="btn btn-primary btn-block" style={{ marginTop: 16 }} onClick={doScan}><Icon name="scan" size={16} /> {T("bills.scan")}</button>}
        </div>
      </Modal>

      <Modal open={addOpen} onClose={() => setAddOpen(false)} title={T("bills.add")}
        footer={<><button className="btn btn-ghost" onClick={() => setAddOpen(false)}>{T("common.cancel")}</button><button className="btn btn-primary" onClick={addBill}>{T("common.add")}</button></>}>
        <div className="field" style={{ marginBottom: 14 }}><label>{T("bills.vendor")}</label><input className="input" value={form.vendor} placeholder={lang === "de" ? "z.B. Krankenkasse" : "e.g. insurer"} onChange={(e) => setForm({ ...form, vendor: e.target.value })} /></div>
        <div className="grid cols-2" style={{ gap: 14 }}>
          <div className="field"><label>{T("docs.amount")} (CHF)</label><input className="input num" inputMode="decimal" value={form.amount} placeholder="0" onChange={(e) => setForm({ ...form, amount: e.target.value })} /></div>
          <div className="field"><label>{T("docs.due")}</label><input className="input" type="date" value={form.due} onChange={(e) => setForm({ ...form, due: e.target.value })} /></div>
        </div>
      </Modal>
    </div>
  );
}

/* ===================== Subscriptions ===================== */
function Subscriptions({ lang }) {
  const T = (k) => window.I18N.t(k, lang);
  const d = window.Vault.data, S = window.Vault.sel, F = window.fmt;
  const reviewCount = d.subscriptions.filter((s) => s.flag === "review").length;
  function cancelSub(id) {
    window.Vault.update((data) => { const s = data.subscriptions.find((x) => x.id === id); data.subscriptions = data.subscriptions.filter((x) => x.id !== id); window.Vault.log("sub.cancelled", s.name); });
  }
  const sorted = [...d.subscriptions].sort((a, b) => (b.flag === "review" ? 1 : 0) - (a.flag === "review" ? 1 : 0) || b.amount - a.amount);

  return (
    <div className="animate">
      <div className="grid cols-3" style={{ marginBottom: 18 }}>
        <div className="stat"><div className="k"><Icon name="loop" size={15} /> {T("subs.monthly")}</div><div className="v num" style={{ fontSize: 24 }}>{F.chf(S.subsMonthly(), { dp: 2 })}</div><div className="s">{d.subscriptions.length} {lang === "de" ? "Abos" : "subscriptions"}</div></div>
        <div className="stat"><div className="k"><Icon name="budget" size={15} /> {T("subs.yearly")}</div><div className="v num" style={{ fontSize: 24 }}>{F.chf(S.subsYearly())}</div></div>
        <div className="stat"><div className="k"><Icon name="bell" size={15} /> {T("subs.review")}</div><div className="v num" style={{ fontSize: 24, color: reviewCount ? "var(--warn)" : undefined }}>{reviewCount}</div><div className="s">{T("subs.reviewHint")}</div></div>
      </div>
      <div className="card card-pad">
        <div className="card-h"><h3>{T("nav.subs")}</h3><span className="eyebrow" style={{ marginLeft: "auto" }}>{lang === "de" ? "automatisch erkannt" : "auto-detected"}</span></div>
        <div style={{ display: "grid", gap: 10 }}>
          {sorted.map((s) => (
            <div className="bill-row" key={s.id}>
              <div className="ic" style={{ fontSize: 18 }}>{s.icon}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="nm" style={{ display: "flex", alignItems: "center", gap: 8 }}>{s.name}{s.flag === "review" && <span className="chip" style={{ fontSize: 10, padding: "2px 7px", color: "var(--warn)" }}>⚠ {T("subs.review")}</span>}</div>
                <div className="sub">{s.category} · {s.cycle === "monthly" ? T("subs.perMonth") : T("subs.perYear")}</div>
              </div>
              <div className="num" style={{ fontWeight: 740, fontSize: 15.5, minWidth: 92, textAlign: "right" }}>{F.chf(s.amount, { dp: 2 })}</div>
              <button className="btn btn-ghost" style={{ padding: "7px 12px", fontSize: 12.5 }} onClick={() => cancelSub(s.id)}><Icon name="trash" size={14} /> {T("subs.cancel")}</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ===================== Goals ===================== */
function Goals({ lang }) {
  const T = (k) => window.I18N.t(k, lang);
  const d = window.Vault.data, S = window.Vault.sel, F = window.fmt;
  const [addOpen, setAddOpen] = useStateM(false);
  const [form, setForm] = useStateM({ name: "", target: "", monthly: "", icon: "🎯" });

  function contribute(g) {
    const v = prompt(T("goals.contribute") + " — " + g.name + " (CHF)");
    const n = parseFloat(String(v || "").replace(/['’]/g, ""));
    if (!n) return;
    window.Vault.update((data) => { const x = data.goals.find((y) => y.id === g.id); x.saved = Math.min(x.target, x.saved + n); window.Vault.log("goal.contribution", g.name + " +" + n); });
  }
  function addGoal() {
    const tgt = parseFloat(String(form.target).replace(/['’]/g, "")) || 0;
    if (!tgt || !form.name) return;
    window.Vault.update((data) => {
      data.goals.push({ id: "go" + Date.now(), name: form.name, target: tgt, saved: 0, icon: form.icon || "🎯", monthly: parseFloat(String(form.monthly).replace(/['’]/g, "")) || 0 });
      window.Vault.log("goal.added", form.name);
    });
    setAddOpen(false); setForm({ name: "", target: "", monthly: "", icon: "🎯" });
  }

  return (
    <div className="animate">
      <div className="screen-toolbar">
        <span className="seclabel"><Icon name="target" size={12} /> {T("goals.totalSaved")}: {F.chf(S.goalsSaved())}</span>
        <button className="btn btn-primary" style={{ marginLeft: "auto" }} onClick={() => setAddOpen(true)}><Icon name="plus" size={16} /> {T("goals.add")}</button>
      </div>
      <div className="grid cols-3">
        {d.goals.map((g) => {
          const pct = Math.min(100, Math.round((g.saved / g.target) * 100));
          const remain = Math.max(0, g.target - g.saved);
          const eta = g.monthly ? Math.ceil(remain / g.monthly) : null;
          return (
            <div className="card card-pad goal-card" key={g.id}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
                <div className="goal-emoji">{g.icon}</div>
                <div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 16 }}>{g.name}</div><div style={{ fontSize: 12.5, color: "var(--ink-3)" }}>{pct}% · {F.chf(g.saved)} {T("goals.of")} {F.chf(g.target)}</div></div>
              </div>
              <div className="bar" style={{ height: 10 }}><i style={{ width: pct + "%" }} /></div>
              <div style={{ display: "flex", alignItems: "center", marginTop: 12 }}>
                <div style={{ fontSize: 12, color: "var(--ink-3)", fontWeight: 600 }}>{pct >= 100 ? T("goals.reached") : eta ? T("goals.eta") + " " + eta + " " + T("goals.months") : F.chf(remain) + " " + (lang === "de" ? "übrig" : "left")}</div>
                <button className="btn btn-ghost" style={{ marginLeft: "auto", padding: "7px 12px", fontSize: 12.5 }} onClick={() => contribute(g)}><Icon name="plus" size={14} /> {T("goals.contribute")}</button>
              </div>
            </div>
          );
        })}
      </div>

      <Modal open={addOpen} onClose={() => setAddOpen(false)} title={T("goals.add")}
        footer={<><button className="btn btn-ghost" onClick={() => setAddOpen(false)}>{T("common.cancel")}</button><button className="btn btn-primary" onClick={addGoal}>{T("common.add")}</button></>}>
        <div className="field" style={{ marginBottom: 14 }}><label>{T("goals.name")}</label><input className="input" value={form.name} placeholder={lang === "de" ? "z.B. Ferien, Notgroschen" : "e.g. holiday, rainy day"} onChange={(e) => setForm({ ...form, name: e.target.value })} /></div>
        <div className="grid cols-2" style={{ gap: 14 }}>
          <div className="field"><label>{T("goals.target")}</label><input className="input num" inputMode="decimal" value={form.target} placeholder="0" onChange={(e) => setForm({ ...form, target: e.target.value })} /></div>
          <div className="field"><label>{T("goals.monthly")}</label><input className="input num" inputMode="decimal" value={form.monthly} placeholder="0" onChange={(e) => setForm({ ...form, monthly: e.target.value })} /></div>
        </div>
      </Modal>
    </div>
  );
}

Object.assign(window, { Bills, Subscriptions, Goals });

  </script>

  <script type="text/babel" data-presets="react">
/* ============================================================
   CasaFin — Life tools: Tax folder · Family + Emergency
   ============================================================ */
const { useState: useStateL } = React;

/* ===================== Tax folder ===================== */
function TaxFolder({ lang }) {
  const T = (k) => window.I18N.t(k, lang);
  const d = window.Vault.data, S = window.Vault.sel, F = window.fmt;
  const found = S.deductionsFound();
  const total = S.deductionsTotal();
  const potential = total - found;
  const estSaving = Math.round(total * 0.24);

  function exportTax() {
    const lines = [];
    lines.push("CasaFin — Steuer-Export für Treuhänder");
    lines.push("Steuerjahr " + d.tax.year + " · Kanton " + d.tax.canton);
    lines.push("Profil: " + d.profile.name);
    lines.push("Erstellt: " + new Date().toLocaleString("de-CH"));
    lines.push("");
    lines.push("ABZÜGE");
    d.tax.deductions.forEach((x) => lines.push("  " + x.label.padEnd(34) + F.chf(x.amount) + "   [" + (x.status === "found" ? "erkannt" : "prüfen") + "]"));
    lines.push("");
    lines.push("Summe Abzüge: " + F.chf(total));
    lines.push("Geschätzte Steuerersparnis: ~" + F.chf(estSaving));
    lines.push("");
    lines.push("Belege (verschlüsselt im Tresor):");
    d.documents.forEach((doc) => lines.push("  • " + doc.name));
    const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "CasaFin-Steuer-" + d.tax.year + ".txt"; a.click();
    URL.revokeObjectURL(url);
    window.Vault.logPersist("tax.exported", "Steuer-Export " + d.tax.year);
  }

  return (
    <div className="animate">
      <div className="screen-toolbar">
        <span className="seclabel"><Icon name="folder" size={12} /> {T("tax.year")} {d.tax.year} · {d.tax.canton}</span>
        <button className="btn btn-gold" style={{ marginLeft: "auto" }} onClick={exportTax}><Icon name="download" size={16} /> {T("tax.export")}</button>
      </div>

      <div className="grid cols-3" style={{ marginBottom: 18 }}>
        <div className="stat"><div className="k"><Icon name="check" size={15} /> {T("tax.found")}</div><div className="v num" style={{ fontSize: 24, color: "var(--brand)" }}>{F.chf(found)}</div></div>
        <div className="stat"><div className="k"><Icon name="docs" size={15} /> {T("tax.potential")}</div><div className="v num" style={{ fontSize: 24 }}>{F.chf(potential)}</div></div>
        <div className="stat"><div className="k"><Icon name="sparkle" size={15} /> {T("tax.estimate")}</div><div className="v num" style={{ fontSize: 24, color: "var(--gold)" }}>~{F.chf(estSaving)}</div></div>
      </div>

      <div className="grid" style={{ gridTemplateColumns: "1.4fr 1fr", alignItems: "start" }}>
        <div className="card card-pad">
          <div className="card-h"><h3>{T("tax.deductions")}</h3><span className="nav-badge" style={{ marginLeft: "auto" }}>{d.tax.deductions.length}</span></div>
          <div style={{ display: "grid", gap: 10 }}>
            {d.tax.deductions.map((x) => (
              <div className="bill-row" key={x.id}>
                <div className="ic" style={{ fontSize: 16 }}><Icon name={x.status === "found" ? "check" : "eye"} size={16} /></div>
                <div style={{ flex: 1 }}><div className="nm">{x.label}</div></div>
                <span className={"chip " + (x.status === "found" ? "pos" : "")} style={{ fontSize: 11, color: x.status === "open" ? "var(--warn)" : undefined }}>{x.status === "found" ? T("tax.statusFound") : T("tax.statusOpen")}</span>
                <div className="num" style={{ fontWeight: 740, fontSize: 15, minWidth: 90, textAlign: "right" }}>{F.chf(x.amount)}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="card card-pad" style={{ background: "linear-gradient(165deg, var(--gold-soft), transparent)" }}>
          <div className="card-h"><div className="set-ic" style={{ width: 30, height: 30 }}><Icon name="folder" size={16} /></div><h3>CasaTax</h3></div>
          <p style={{ fontSize: 13.5, color: "var(--ink-2)", lineHeight: 1.55, marginBottom: 14 }}>
            {lang === "de"
              ? "Alle Belege werden das ganze Jahr automatisch gesammelt und nach Kanton geprüft. Beim Export erhält dein Treuhänder eine saubere Aufstellung — verschlüsselt, nur von dir freigegeben."
              : "All receipts are collected automatically all year and checked by canton. On export your trustee gets a clean breakdown — encrypted, released only by you."}
          </p>
          <button className="btn btn-gold btn-block" onClick={exportTax}><Icon name="download" size={16} /> {T("tax.export")}</button>
          <div className="seclabel" style={{ marginTop: 14 }}><Icon name="lock" size={12} /> {T("sec.encrypted")}</div>
        </div>
      </div>
    </div>
  );
}

/* ===================== Family + Emergency ===================== */
const MEMBER_COLORS = ["#0E9E8E", "#5BB8E8", "#E8A33C", "#B07CE0"];

function Family({ lang }) {
  const T = (k) => window.I18N.t(k, lang);
  const d = window.Vault.data, S = window.Vault.sel, F = window.fmt;
  const [addOpen, setAddOpen] = useStateL(false);
  const [form, setForm] = useStateL({ name: "", role: "adult" });

  function addMember() {
    if (!form.name.trim()) return;
    const initials = form.name.trim().split(/\s+/).map((w) => w[0]).slice(0, 2).join("").toUpperCase();
    window.Vault.update((data) => {
      data.family.members.push({ id: "f" + Date.now(), name: form.name.trim(), role: form.role, initials, tag: form.role === "child" ? T("fam.child") : T("fam.adult") });
      window.Vault.log("family.added", form.name);
    });
    setAddOpen(false); setForm({ name: "", role: "adult" });
  }

  const policies = d.subscriptions.filter((s) => s.category === "Versicherung");
  const juniorTotal = d.family.junior.reduce((s, j) => s + j.balance, 0);

  return (
    <div className="animate">

/* ---------- lightweight local parsers (offline, AI-upgradeable) ---------- */
function bizToday() { return new Date().toISOString().slice(0, 10); }
function bizAmt(s) {
  const m = String(s).match(/(\d[\d'’.\s]*[.,]?\d*)/);
  if (!m) return 0;
  let n = m[1].replace(/['’\s]/g, "");
  if (n.indexOf(",") > -1 && n.indexOf(".") === -1) n = n.replace(",", ".");
  else n = n.replace(/,/g, "");
  return Math.abs(parseFloat(n) || 0);
}
function bizCat(t) {
  t = (t || "").toLowerCase();
  if (/(tank|benzin|diesel|fahrzeug|auto|garage|parking|sbb|zug|öv|\bov\b|mobility)/.test(t)) return "Fahrzeug";
  if (/(material|ware|rohstoff|werkzeug)/.test(t)) return "Material";
  if (/(büro|buro|office|miete|raum|strom|internet|telefon|domain|hosting|software|saas|abo)/.test(t)) return "Büro";
  if (/(versicher|haftpflicht|police|suva|bvg)/.test(t)) return "Versicherung";
  if (/(kurs|weiterbildung|seminar|schulung|workshop|konferenz)/.test(t)) return "Weiterbildung";
  return "Sonstiges";
}
function bizKind(t) {
  t = (t || "").toLowerCase();
  if (/(honorar|umsatz|ertrag|einnahme|erhalten|verkauf|rechnung gestellt|eingang|gutschrift|kunde|lohn erhalten)/.test(t)) return "revenue";
  return "expense";
}
function bizDate(t) {
  const d = new Date(); t = (t || "").toLowerCase();
  if (/vorgestern/.test(t)) d.setDate(d.getDate() - 2);
  else if (/gestern/.test(t)) d.setDate(d.getDate() - 1);
  const iso = t.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return iso[0];
  const ch = t.match(/(\d{1,2})\.(\d{1,2})\.(\d{2,4})/);
  if (ch) { let y = ch[3].length === 2 ? "20" + ch[3] : ch[3]; return y + "-" + ch[2].padStart(2, "0") + "-" + ch[1].padStart(2, "0"); }
  return d.toISOString().slice(0, 10);
}
function bizLabel(t) {
  let s = String(t || "")
    .replace(/^\s*(erfasse?|erfass|buche?|trage?|notiere?|add|book|record)\b/i, "")
    .replace(/\b(mir|bitte|eine?|einen|den|die|das|für|fuer|von|vom|am)\b/gi, " ")
    .replace(/\b(chf|fr\.?|franken|sfr)\b/gi, " ")
    .replace(/(\d[\d'’.,\s]*\.?-?)/g, " ")
    .replace(/\b(gestern|heute|vorgestern)\b/gi, " ")
    .replace(/\b(einnahme|ausgabe|ausgaben|einnahmen)\b/gi, " ")
    .replace(/\s+/g, " ").trim();
  if (!s) s = "Buchung";
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function parseBookingCommand(text) {
  return { kind: bizKind(text), label: bizLabel(text), amount: bizAmt(text), cat: bizCat(text), date: bizDate(text) };
}
function parseCamt053(xml) {
  try {
    const doc = new DOMParser().parseFromString(xml, "application/xml");
    const ntries = Array.prototype.slice.call(doc.getElementsByTagName("Ntry"));
    return ntries.map((n, i) => {
      const amtEl = n.getElementsByTagName("Amt")[0];
      const cd = (n.getElementsByTagName("CdtDbtInd")[0] || {}).textContent || "DBIT";
      const bd = n.getElementsByTagName("BookgDt")[0];
      const dt = bd && bd.getElementsByTagName("Dt")[0] ? bd.getElementsByTagName("Dt")[0].textContent : "";
      const u = n.getElementsByTagName("Ustrd")[0] || n.getElementsByTagName("AddtlNtryInf")[0];
      const desc = u ? u.textContent.trim() : "";
      return { sel: true, kind: cd === "CRDT" ? "revenue" : "expense", amount: Math.abs(parseFloat(amtEl ? amtEl.textContent : 0) || 0), label: desc || ("Transaktion " + (i + 1)), date: (dt || "").slice(0, 10), cat: bizCat(desc) };
    }).filter((r) => r.amount > 0);
  } catch (e) { return []; }
}
function parseCsvRows(txt) {
  const lines = txt.trim().split(/\r?\n/).filter(Boolean);
  const out = [];
  lines.forEach((line, i) => {
    if (i === 0 && /datum|date|betrag|amount|beschreib|description|text/i.test(line)) return;

    if (c.length < 2) return;
    const date = (c[0] || "").trim();
    const label = (c[1] || "").trim();
    const amtCell = c.length > 2 ? c[2] : c[1];
    const neg = /-/.test(String(amtCell));

  });

}
async function casafinAiExtract(payload) {
  const ep = window.CASAFIN_AI_ENDPOINT;

    const r = await fetch(ep, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}

function Business({ lang }) {
  const T = (k) => window.I18N.t(k, lang);
  const de = lang === "de";
  const d = window.Vault.data, S = window.Vault.sel, F = window.fmt;

  biz.expenses.forEach((e) => { const v = vof(e); (vatGroups[v] = vatGroups[v] || { out: 0, inp: 0 }).inp += Math.round(e.amount * v / 100); });
  const vatOut = Object.values(vatGroups).reduce((a, g) => a + g.out, 0);
  const vatIn = Object.values(vatGroups).reduce((a, g) => a + g.inp, 0);

  const vatRatesUsed = Object.keys(vatGroups).map(Number).sort((a, b) => b - a);
  const expCats = EXP_CATS;
  const expAccounts = chart.accounts.filter((a) => a.type === "expense");

  function openCapture() { setOpen(true); setMode("hub"); setDraft(null); setRows(null); setChat(""); setNote(""); setForm({ kind: "revenue", label: "", amount: "", cat: "Material", vat: chart.vatDefault }); }
  function closeCapture() { setOpen(false); setDraft(null); setRows(null); setChat(""); setNote(""); }

  function commit(entry) {
    const amt = Math.abs(parseFloat(String(entry.amount).replace(/['’]/g, "")) || 0);
    if (!amt || !String(entry.label).trim()) return false;
    window.Vault.update((data) => {
      const id = "bz" + Date.now() + Math.floor(Math.random() * 999);
      const vat = (entry.vat === 0 || entry.vat) ? Number(entry.vat) : chart.vatDefault;
      if (entry.kind === "revenue") data.business.revenue.unshift({ id, label: String(entry.label).trim(), amount: amt, date: entry.date || bizToday(), vat });

        <div className="field" style={{ marginBottom: 12 }}><label>{de ? "Beschreibung" : "Description"}</label><input className="input" value={draft.label} onChange={(e) => setDraft({ ...draft, label: e.target.value })} /></div>
        <div className="grid cols-2" style={{ gap: 12 }}>
          <div className="field"><label>{de ? "Betrag (CHF)" : "Amount (CHF)"}</label><input className="input num" inputMode="decimal" value={draft.amount} placeholder="0" onChange={(e) => setDraft({ ...draft, amount: e.target.value })} /></div>
          {draft.kind === "expense"
            ? <div className="field"><label>{T("biz.account")}</label><select className="input" value={draft.cat} onChange={(e) => setDraft({ ...draft, cat: e.target.value })}>{expCats.map((c) => <option key={c} value={c}>{expAccount(chart, c).nr} · {c}</option>)}</select></div>
            : <div className="field"><label>{de ? "Datum" : "Date"}</label><input className="input" type="date" value={draft.date} onChange={(e) => setDraft({ ...draft, date: e.target.value })} /></div>}
        </div>
        <div className="grid cols-2" style={{ gap: 12, marginTop: 12 }}>
          <div className="field"><label>{de ? "MwSt-Satz" : "VAT rate"}</label>
            <select className="input" value={draft.vat} onChange={(e) => setDraft({ ...draft, vat: Number(e.target.value) })}>{chart.vatRates.map((v) => <option key={v.rate} value={v.rate}>{v.rate}% · {v.name}</option>)}</select>
          </div>
          {draft.kind === "expense" ? <div className="field"><label>{de ? "Datum" : "Date"}</label><input className="input" type="date" value={draft.date} onChange={(e) => setDraft({ ...draft, date: e.target.value })} /></div> : <div className="field" />}
        </div>
        {note && <div className="auth-err" style={{ marginTop: 12 }}>{note}</div>}
        <div className="seclabel" style={{ marginTop: 14 }}><Icon name="loop" size={12} /> {draft.kind === "expense" ? expAccount(chart, draft.cat).nr + " · " + expAccount(chart, draft.cat).name : revAccount(chart).nr + " · " + revAccount(chart).name} · {de ? "auto-kontiert" : "auto-posted"}</div>
      </div>
    );
  }

  function Tile({ icon, title, desc, onClick, badge }) {
    return (
      <button className="cap-tile" onClick={onClick}>
        <div className="cap-ic"><Icon name={icon} size={20} /></div>
        <div style={{ flex: 1, textAlign: "left" }}>
          <div className="cap-t">{title}{badge && <span className="cap-badge">{badge}</span>}</div>
          <div className="cap-d">{desc}</div>
        </div>
        <Icon name="arrow" size={16} />
      </button>
    );
  }

  let title = T("biz.add"), body = null, footer = null;
  if (mode === "hub") {
    title = de ? "Buchung erfassen" : "Add booking";
    body = (
      <div className="cap-hub animate">
        <p className="cap-lead">{de ? "Lass CasaFin buchen — wähle deine Quelle:" : "Let CasaFin do the booking — pick a source:"}</p>
        <Tile icon="sparkle" title={de ? "Per Chat erfassen" : "Capture by chat"} desc={de ? "„erfasse 250 CHF Tankquittung gestern“" : "“book 250 CHF fuel receipt yesterday”"} badge="AI" onClick={() => { setMode("chat"); setDraft(null); }} />
        <Tile icon="receipt" title={de ? "Beleg scannen" : "Scan receipt"} desc={de ? "Foto/PDF — AI liest Betrag, MwSt & Konto" : "Photo/PDF — AI reads amount, VAT & account"} badge="AI" onClick={() => { setMode("beleg"); setDraft(null); }} />
        <Tile icon="folder" title={de ? "Bank-Auszug importieren" : "Import bank statement"} desc={de ? "camt.053 (XML) oder CSV — alle Buchungen" : "camt.053 (XML) or CSV — all bookings"} onClick={() => { setMode("bank"); setRows(null); }} />
        <button className="cap-manual" onClick={() => setMode("manual")}>{de ? "oder manuell erfassen" : "or enter manually"}</button>
      </div>
    );
    footer = <button className="btn btn-ghost" onClick={closeCapture}>{T("common.cancel")}</button>;
  } else if (mode === "chat") {
    title = de ? "Per Chat erfassen" : "Capture by chat";
    body = draft ? <DraftConfirm /> : (
      <div className="animate">
        <p className="cap-lead">{de ? "Schreib in einem Satz, was du buchen willst:" : "Write in one sentence what to book:"}</p>
        <textarea className="input" rows={3} autoFocus value={chat} placeholder={de ? "z.B. erfasse 250 CHF Tankquittung von gestern" : "e.g. book 250 CHF fuel receipt yesterday"} onChange={(e) => setChat(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) runChat(); }} style={{ resize: "none" }} />
        <div className="cap-hints">{(de ? ["Honorar 1'800 erhalten", "Büromiete 950 bezahlt", "Mobility 48.50 gestern"] : ["fee 1'800 received", "office rent 950 paid", "Mobility 48.50 yesterday"]).map((h) => <button key={h} className="cap-hint" onClick={() => setChat(h)}>{h}</button>)}</div>
      </div>
    );
    footer = draft
      ? <><button className="btn btn-ghost" onClick={() => setDraft(null)}>{de ? "Zurück" : "Back"}</button><button className="btn btn-primary" onClick={() => { if (commit({ ...draft })) closeCapture(); }}>{de ? "Buchen" : "Book"}</button></>
      : <><button className="btn btn-ghost" onClick={() => setMode("hub")}>{de ? "Zurück" : "Back"}</button><button className="btn btn-primary" onClick={runChat} disabled={busy || !chat.trim()}>{busy ? "…" : (de ? "Erkennen" : "Detect")} <Icon name="arrow" size={16} /></button></>;
  } else if (mode === "beleg") {
    title = de ? "Beleg scannen" : "Scan receipt";
    body = draft ? <DraftConfirm /> : (
      <div className="animate">
        <label className="dropzone" style={{ cursor: "pointer" }}>
          <input type="file" accept="image/*,application/pdf" style={{ display: "none" }} onChange={(e) => onReceipt(e.target.files[0])} />
          <div className="dz-icon"><Icon name="scan" size={24} /></div>
          <div style={{ fontWeight: 650 }}>{busy ? (de ? "Liest Beleg…" : "Reading receipt…") : (de ? "Foto / PDF auswählen" : "Choose photo / PDF")}</div>
          <div style={{ fontSize: 12.5, color: "var(--ink-3)", marginTop: 4 }}>{de ? "AI liest Händler, Datum, Betrag, MwSt & Konto" : "AI reads vendor, date, amount, VAT & account"}</div>
        </label>
        {note && <div className="auth-err" style={{ marginTop: 12 }}>{note}</div>}
      </div>
    );
    footer = draft
      ? <><button className="btn btn-ghost" onClick={() => { setDraft(null); setNote(""); }}>{de ? "Zurück" : "Back"}</button><button className="btn btn-primary" onClick={() => { if (commit({ ...draft })) closeCapture(); }}>{de ? "Buchen" : "Book"}</button></>
      : <button className="btn btn-ghost" onClick={() => setMode("hub")}>{de ? "Zurück" : "Back"}</button>;
  } else if (mode === "bank") {
    title = de ? "Bank-Auszug importieren" : "Import bank statement";
    body = (
      <div className="animate">
        {!rows ? (
          <label className="dropzone" style={{ cursor: "pointer" }}>
            <input type="file" accept=".xml,.csv,text/csv,application/xml" style={{ display: "none" }} onChange={(e) => onBankFile(e.target.files[0])} />
            <div className="dz-icon"><Icon name="folder" size={24} /></div>
            <div style={{ fontWeight: 650 }}>{de ? "camt.053 (XML) oder CSV wählen" : "Choose camt.053 (XML) or CSV"}</div>
            <div style={{ fontSize: 12.5, color: "var(--ink-3)", marginTop: 4 }}>{de ? "Alle Transaktionen werden automatisch kontiert" : "All transactions auto-categorised"}</div>
          </label>
        ) : (
          <div>
            <div className="seclabel" style={{ marginBottom: 10 }}><Icon name="check" size={12} /> {rows.length} {de ? "Transaktionen erkannt" : "transactions found"}</div>
            <div className="scroll" style={{ maxHeight: 300, overflowY: "auto", margin: "0 -4px", padding: "0 4px" }}>
              {rows.map((r, i) => (
                <label key={i} className="bill-row" style={{ marginBottom: 8, cursor: "pointer", alignItems: "center" }}>
                  <input type="checkbox" checked={r.sel} onChange={(e) => { const c = rows.slice(); c[i] = { ...r, sel: e.target.checked }; setRows(c); }} />
                  <div style={{ flex: 1, marginLeft: 4 }}><div className="nm">{r.label}</div><div className="sub">{r.date || "—"} · {r.kind === "revenue" ? revAccount(chart).nr + " " + revAccount(chart).name : expAccount(chart, r.cat).nr + " " + expAccount(chart, r.cat).name}</div></div>
                  <div className={"num" + (r.kind === "revenue" ? " up" : "")} style={{ fontWeight: 740 }}>{r.kind === "expense" ? "−" : ""}{F.chf(r.amount)}</div>
                </label>
              ))}
            </div>
          </div>
        )}
        {note && <div className={rows && rows.length ? "seclabel" : "auth-err"} style={{ marginTop: 12 }}>{note}</div>}
      </div>
    );
    footer = rows && rows.length
      ? <><button className="btn btn-ghost" onClick={() => { setRows(null); setNote(""); }}>{de ? "Andere Datei" : "Other file"}</button><button className="btn btn-primary" onClick={importRows}>{rows.filter((r) => r.sel).length} {de ? "übernehmen" : "import"}</button></>
      : <button className="btn btn-ghost" onClick={() => setMode("hub")}>{de ? "Zurück" : "Back"}</button>;
  } else {
    title = de ? "Manuell erfassen" : "Manual entry";
    body = (
      <div className="animate">
        <div className="field" style={{ marginBottom: 14 }}><label>{T("biz.kind")}</label>
          <Segmented value={form.kind} onChange={(v) => setForm({ ...form, kind: v })} options={[{ value: "revenue", label: T("biz.revenue") }, { value: "expense", label: T("biz.expenses") }]} />
        </div>
        <div className="field" style={{ marginBottom: 14 }}><label>{de ? "Beschreibung" : "Description"}</label><input className="input" value={form.label} placeholder={de ? "z.B. Honorar Projekt X" : "e.g. fee project X"} onChange={(e) => setForm({ ...form, label: e.target.value })} /></div>
        <div className="grid cols-2" style={{ gap: 14 }}>
          <div className="field"><label>{de ? "Betrag (CHF)" : "Amount (CHF)"}</label><input className="input num" inputMode="decimal" value={form.amount} placeholder="0" onChange={(e) => setForm({ ...form, amount: e.target.value })} /></div>
          {form.kind === "expense" && (
            <div className="field"><label>{T("biz.account")}</label>
              <select className="input" value={form.cat} onChange={(e) => setForm({ ...form, cat: e.target.value })}>{expCats.map((c) => <option key={c} value={c}>{expAccount(chart, c).nr} · {c}</option>)}</select>
            </div>
          )}
        </div>
        <div className="field" style={{ marginTop: 14 }}><label>{de ? "MwSt-Satz" : "VAT rate"}</label>
          <select className="input" value={form.vat} onChange={(e) => setForm({ ...form, vat: Number(e.target.value) })}>{chart.vatRates.map((v) => <option key={v.rate} value={v.rate}>{v.rate}% · {v.name}</option>)}</select>
        </div>
        <div className="seclabel" style={{ marginTop: 16 }}><Icon name="loop" size={12} /> {T("biz.autoBooked")} · {de ? "Kontenplan" : "Chart"}: {FRAMEWORKS[chart.framework] ? FRAMEWORKS[chart.framework].label[lang] : chart.framework}</div>
      </div>
    );
    footer = <><button className="btn btn-ghost" onClick={() => setMode("hub")}>{de ? "Zurück" : "Back"}</button><button className="btn btn-primary" onClick={() => { if (commit({ ...form, source: "manual" })) closeCapture(); }}>{T("common.add")}</button></>;
  }

  return (
    <div className="animate">
      <div className="screen-toolbar">
        <span className="seclabel"><Icon name="briefcase" size={12} /> {biz.name}{biz.vatRegistered ? " · " + T("biz.registered") : ""}</span>
        <button className="btn btn-ghost" style={{ marginLeft: "auto" }} onClick={openChartEditor}><Icon name="settings" size={16} /> {de ? "Kontenplan" : "Chart"}</button>
        <button className="btn btn-primary" style={{ marginLeft: 0 }} onClick={openCapture}><Icon name="plus" size={16} /> {de ? "Buchung erfassen" : "Add booking"}</button>
        <button className="btn btn-gold" style={{ marginLeft: 0 }} onClick={exportAbschluss}><Icon name="download" size={16} /> {T("biz.export")}</button>
      </div>

      <div className="grid cols-4" style={{ marginBottom: 18 }}>
        <div className="stat"><div className="k"><Icon name="budget" size={15} /> {T("biz.revenue")}</div><div className="v num up" style={{ fontSize: 23 }}>{F.chf(rev)}</div></div>
        <div className="stat"><div className="k"><Icon name="budget" size={15} style={{ transform: "scaleY(-1)" }} /> {T("biz.expenses")}</div><div className="v num" style={{ fontSize: 23 }}>{F.chf(exp)}</div></div>
        <div className="stat"><div className="k"><Icon name="briefcase" size={15} /> {T("biz.profit")}</div><div className="v num" style={{ fontSize: 23, color: "var(--brand)" }}>{F.chf(profit)}</div></div>
        <div className="stat"><div className="k"><Icon name="folder" size={15} /> {T("biz.vat")}</div><div className="v num" style={{ fontSize: 23, color: vatBal > 0 ? "var(--neg)" : "var(--brand)" }}>{F.chf(vatBal)}</div><div className="s">{biz.vatRate}% MWST</div></div>
      </div>

      <div className="grid" style={{ gridTemplateColumns: "1.55fr 1fr", alignItems: "start" }}>
        <div className="card card-pad">
          <div className="card-h"><h3>{T("biz.pl")}</h3><span className="eyebrow" style={{ marginLeft: "auto" }}>{biz.year}</span></div>
          <div className="pl-sec">{T("biz.revenue")}</div>
          {biz.revenue.map((r) => (
            <div className="bill-row" key={r.id} style={{ marginBottom: 8 }}>
              <span className="konto">{revAccount(chart).nr}</span>
              <div style={{ flex: 1 }}><div className="nm">{r.label}</div><div className="sub">{revAccount(chart).name} · <span style={{ color: "var(--brand-ink)" }}>{T("biz.autoBooked")}</span></div></div>
              <div className="num up" style={{ fontWeight: 740, fontSize: 15 }}>{F.chf(r.amount)}</div>
            </div>
          ))}
          <div className="pl-total"><span>{T("biz.total")} {T("biz.revenue")}</span><span className="num">{F.chf(rev)}</span></div>

          <div className="pl-sec" style={{ marginTop: 18 }}>{T("biz.expenses")}</div>
          {biz.expenses.map((e) => { const k = expAccount(chart, e.cat); return (
            <div className="bill-row" key={e.id} style={{ marginBottom: 8 }}>
              <span className="konto">{k.nr}</span>
              <div style={{ flex: 1 }}><div className="nm">{e.label}</div><div className="sub">{k.name} · <span style={{ color: "var(--brand-ink)" }}>{T("biz.autoBooked")}</span></div></div>
              <div className="num" style={{ fontWeight: 740, fontSize: 15 }}>{F.chf(e.amount)}</div>
            </div>
          ); })}
          <div className="pl-total"><span>{T("biz.total")} {T("biz.expenses")}</span><span className="num">{F.chf(exp)}</span></div>

          <div className="pl-profit"><span>{T("biz.net")}</span><span className="num">{F.chf(profit)}</span></div>
        </div>

        <div className="grid">
          <div className="card card-pad" style={{ background: "linear-gradient(165deg, var(--brand-soft), transparent)" }}>
            <div className="card-h"><div className="set-ic" style={{ width: 30, height: 30 }}><Icon name="loop" size={16} /></div><h3>{T("biz.autoTitle")}</h3></div>
            <p style={{ fontSize: 13.5, color: "var(--ink-2)", lineHeight: 1.55 }}>{T("biz.autoDesc")}</p>
            <button className="seclabel" style={{ marginTop: 12, cursor: "pointer" }} onClick={openChartEditor}><Icon name="settings" size={12} /> {FRAMEWORKS[chart.framework] ? FRAMEWORKS[chart.framework].label[lang] : chart.framework} · {chart.accounts.length} {de ? "Konten — anpassen" : "accounts — edit"}</button>
          </div>

          <div className="card card-pad">
            <div className="card-h"><div className="set-ic" style={{ width: 30, height: 30 }}><Icon name="folder" size={16} /></div><h3>{T("biz.vatTitle")}</h3></div>
            <div className="vat-row"><span>{T("biz.vatOut")} <small>({biz.vatRate}%)</small></span><span className="num">{F.chf(vatOut)}</span></div>
            <div className="vat-row"><span>− {T("biz.vatIn")}</span><span className="num">{F.chf(vatIn)}</span></div>
            <div className="vat-row total"><span>{T("biz.vat")}</span><span className="num" style={{ color: vatBal > 0 ? "var(--neg)" : "var(--brand)" }}>{F.chf(vatBal)}</span></div>
            <div style={{ fontSize: 12, color: "var(--ink-3)", marginTop: 10 }}>{vatBal > 0 ? (de ? "an die ESTV zu zahlen" : "payable to the tax office") : (de ? "Guthaben" : "credit")}</div>
            {vatRatesUsed.length > 1 && (
              <div style={{ marginTop: 12, paddingTop: 10, borderTop: "1px solid var(--line)" }}>
                <div className="eyebrow" style={{ marginBottom: 6 }}>{de ? "nach Satz" : "by rate"}</div>
                {vatRatesUsed.map((r) => (
                  <div className="vat-row" key={r} style={{ fontSize: 12.5 }}><span>{r}% · {rateName(chart, r)}</span><span className="num">{F.chf((vatGroups[r].out || 0) - (vatGroups[r].inp || 0))}</span></div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      <Modal open={open} onClose={closeCapture} title={title} footer={footer}>{body}</Modal>

      <Modal open={chartOpen} onClose={() => { setChartOpen(false); setCd(null); }} title={de ? "Kontenplan bearbeiten" : "Edit chart of accounts"}
        footer={cd ? <><button className="btn btn-ghost" onClick={() => { setChartOpen(false); setCd(null); }}>{T("common.cancel")}</button><button className="btn btn-primary" onClick={saveChart}>{de ? "Speichern" : "Save"}</button></> : null}>
        {cd && (
          <div className="animate">
            <div className="field" style={{ marginBottom: 16 }}><label>{de ? "Vorlage" : "Template"}</label>
              <Segmented value={cd.framework} onChange={reseed} options={Object.keys(FRAMEWORKS).map((k) => ({ value: k, label: FRAMEWORKS[k].label[lang] }))} />
            </div>

            <div className="pl-sec">{de ? "Ertragskonten" : "Revenue accounts"}</div>
            {cd.accounts.map((a, i) => a.type === "revenue" && (
              <div key={i} className="koeditrow">
                <input className="input num" style={{ width: 78 }} value={a.nr} onChange={(e) => editAccount(i, "nr", e.target.value)} placeholder="Nr" />
                <input className="input" value={a.name} onChange={(e) => editAccount(i, "name", e.target.value)} placeholder={de ? "Bezeichnung" : "Name"} />
                <button className="koedel" onClick={() => delAccount(i)} aria-label="del"><Icon name="trash" size={15} /></button>
              </div>
            ))}
            <button className="cap-hint" style={{ marginTop: 6 }} onClick={() => addAccount("revenue")}><Icon name="plus" size={12} /> {de ? "Ertragskonto" : "Revenue account"}</button>

            <div className="pl-sec" style={{ marginTop: 18 }}>{de ? "Aufwandskonten" : "Expense accounts"}</div>
            {cd.accounts.map((a, i) => a.type === "expense" && (
              <div key={i} className="koeditrow">
                <input className="input num" style={{ width: 78 }} value={a.nr} onChange={(e) => editAccount(i, "nr", e.target.value)} placeholder="Nr" />
                <input className="input" value={a.name} onChange={(e) => editAccount(i, "name", e.target.value)} placeholder={de ? "Bezeichnung" : "Name"} />
                <button className="koedel" onClick={() => delAccount(i)} aria-label="del"><Icon name="trash" size={15} /></button>
              </div>
            ))}
            <button className="cap-hint" style={{ marginTop: 6 }} onClick={() => addAccount("expense")}><Icon name="plus" size={12} /> {de ? "Aufwandskonto" : "Expense account"}</button>

            <div className="pl-sec" style={{ marginTop: 18 }}>{de ? "Auto-Kontierung (Kategorie → Konto)" : "Auto-posting (category → account)"}</div>
            <p style={{ fontSize: 12.5, color: "var(--ink-3)", margin: "2px 0 10px", lineHeight: 1.5 }}>{de ? "Bestimmt, auf welches Konto Chat, Beleg & Bank-Import automatisch buchen." : "Controls which account chat, receipts & bank import post to automatically."}</p>
            {EXP_CATS.map((cat) => (
              <div key={cat} className="koeditrow">
                <span style={{ width: 110, fontSize: 13, fontWeight: 600 }}>{cat}</span>
                <select className="input" value={cd.map[cat] || ""} onChange={(e) => setMap(cat, e.target.value)}>
                  {cd.accounts.filter((a) => a.type === "expense").map((a) => <option key={a.nr} value={a.nr}>{a.nr} · {a.name}</option>)}
                </select>
              </div>
            ))}

            <div className="pl-sec" style={{ marginTop: 18 }}>{de ? "MwSt-Sätze" : "VAT rates"}</div>
            {cd.vatRates.map((v, i) => (
              <div key={i} className="koeditrow">
                <input className="input num" style={{ width: 78 }} value={v.rate} onChange={(e) => { const a = cd.vatRates.slice(); a[i] = { ...a[i], rate: e.target.value === "" ? "" : Number(e.target.value) }; setCd({ ...cd, vatRates: a }); }} placeholder="%" />
                <input className="input" value={v.name} onChange={(e) => { const a = cd.vatRates.slice(); a[i] = { ...a[i], name: e.target.value }; setCd({ ...cd, vatRates: a }); }} placeholder={de ? "Bezeichnung" : "Name"} />
                <button className="koedel" onClick={() => { const a = cd.vatRates.slice(); a.splice(i, 1); setCd({ ...cd, vatRates: a }); }} aria-label="del"><Icon name="trash" size={15} /></button>
              </div>
            ))}
            <button className="cap-hint" style={{ marginTop: 6 }} onClick={() => setCd({ ...cd, vatRates: cd.vatRates.concat([{ rate: 0, name: "" }]) })}><Icon name="plus" size={12} /> {de ? "MwSt-Satz" : "VAT rate"}</button>
            <div className="field" style={{ marginTop: 12 }}><label>{de ? "Standard-Satz für neue Buchungen" : "Default rate for new bookings"}</label>
              <select className="input" value={cd.vatDefault} onChange={(e) => setCd({ ...cd, vatDefault: Number(e.target.value) })}>{cd.vatRates.filter((v) => v.rate !== "").map((v) => <option key={v.rate} value={v.rate}>{v.rate}% · {v.name}</option>)}</select>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

window.Business = Business;

  </script>

  <script type="text/babel" data-presets="react">
/* ============================================================
   CasaFin — Root app
   ============================================================ */
const { useState, useEffect, useCallback, useRef } = React;

function useVaultState() {
  const [, force] = useState(0);
  useEffect(() => window.Vault.subscribe(() => force((n) => n + 1)), []);
  return window.Vault;
}

function App() {
  const prefs = window.Vault.getPrefs();
  const [lang, setLangState] = useState(prefs.lang);
  const [theme, setThemeState] = useState(prefs.theme);
  const [accent, setAccentState] = useState(prefs.accent || "olive");
  const [customColor, setCustomColorState] = useState(prefs.accentColor || "#B3C242");
  const [route, setRoute] = useState("dashboard");
  const [authed, setAuthed] = useState(false);
  const vault = useVaultState();
  const unlocked = vault.isUnlocked() && authed;

  useEffect(() => { document.documentElement.setAttribute("data-theme", theme); }, [theme]);
  useEffect(() => { window.applyAccent(accent, theme, customColor); }, [accent, theme, customColor]);
  const setLang = (l) => { setLangState(l); window.Vault.setPrefs({ lang: l }); };
  const setAccent = (a) => { setAccentState(a); window.Vault.setPrefs({ accent: a }); };
  const setCustomColor = (c) => { setCustomColorState(c); setAccentState("custom"); window.Vault.setPrefs({ accent: "custom", accentColor: c }); };
  const setTheme = (t) => {
    const el = document.documentElement;
    el.classList.add("theme-switching");
    setThemeState(t); window.Vault.setPrefs({ theme: t });
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.remove("theme-switching")));
  };

  /* ---- auto-lock ---- */
  const timer = useRef(null);
  useEffect(() => {
    if (!unlocked) return;
    const mins = (window.Vault.data?.settings?.autoLockMin) || 5;
    const reset = () => {
      clearTimeout(timer.current);
      timer.current = setTimeout(() => { window.Vault.logPersist("vault.autolock", "Auto-Sperre"); window.Vault.lock(); }, mins * 60000);
    };
    const evts = ["mousemove", "keydown", "click", "scroll", "touchstart"];
    evts.forEach((e) => window.addEventListener(e, reset, { passive: true }));
    reset();
    return () => { clearTimeout(timer.current); evts.forEach((e) => window.removeEventListener(e, reset)); };
  }, [unlocked]);

  const lock = useCallback(() => { window.Vault.logPersist("vault.locked", "Manuell gesperrt"); window.Vault.lock(); setAuthed(false); }, []);

  if (!unlocked) {
    return <AuthScreen lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} onUnlocked={() => { setAuthed(true); setRoute("dashboard"); }} />;
  }

  const d = window.Vault.data, F = window.fmt;
  const T = (k) => window.I18N.t(k, lang);
  const hour = new Date().getHours();
  const greet = hour < 11 ? T("dash.greetMorning") : hour < 18 ? T("dash.greetDay") : T("dash.greetEvening");
  const firstName = d.profile.name.split(" ")[0];

  const heads = {
    dashboard: { title: greet + ", ", em: firstName, sub: new Date().toLocaleDateString(lang === "de" ? "de-CH" : "en-GB", { weekday: "long", day: "numeric", month: "long" }) },
    bills: { eyebrow: "Cashflow", title: T("bills.title"), em: T("bills.titleEm"), sub: T("bills.sub") },
    goals: { eyebrow: "Sparen", title: T("goals.title"), em: T("goals.titleEm"), sub: T("goals.sub") },
    accounts: { eyebrow: "Portfolio", title: T("acc.title"), em: T("acc.titleEm"), sub: d.accounts.length + " " + (lang === "de" ? "verbundene Konten · Read-only" : "connected accounts · read-only") },
    business: { eyebrow: "Einzelfirma", title: T("biz.head"), em: T("biz.headEm"), sub: T("biz.sub") },
    tax: { eyebrow: "CasaTax", title: T("tax.title"), em: T("tax.titleEm"), sub: T("tax.sub") },
    family: { eyebrow: "CasaFamily", title: T("fam.title"), em: T("fam.titleEm"), sub: T("fam.sub") },
    budget: { eyebrow: lang === "de" ? "Mai 2026" : "May 2026", title: T("bud.title"), em: T("bud.titleEm") },
    fina: { eyebrow: "AI Copilot", title: "Fina", sub: T("fina.role") },
    subs: { eyebrow: "CasaBudget", title: T("subs.title"), em: T("subs.titleEm"), sub: T("subs.sub") },
    docs: { eyebrow: "OCR · AES-256", title: T("docs.title"), em: T("docs.titleEm") },
    agents: { eyebrow: "Claude · 5 " + (lang === "de" ? "aktiv" : "active"), title: T("agents.title"), em: T("agents.titleEm"), sub: T("agents.sub") },
    settings: { eyebrow: "Account", title: T("set.title") },
  };
  const h = heads[route];

  return (
    <div className="app">
      <Sidebar route={route} setRoute={setRoute} lang={lang} profile={d.profile} />
      <main className="main scroll">
        <div className="main-inner">
          <Topbar lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} onLock={lock}
            title={h.title} em={h.em} sub={h.sub} eyebrow={h.eyebrow} />
          {route === "dashboard" && <Dashboard lang={lang} go={setRoute} />}
          {route === "bills" && <Bills lang={lang} />}
          {route === "goals" && <Goals lang={lang} />}
          {route === "accounts" && <Accounts lang={lang} />}
          {route === "business" && <Business lang={lang} />}
          {route === "tax" && <TaxFolder lang={lang} />}
          {route === "family" && <Family lang={lang} />}
          {route === "budget" && <Budget lang={lang} />}
          {route === "fina" && <Fina lang={lang} />}
          {route === "subs" && <Subscriptions lang={lang} />}
          {route === "docs" && <Documents lang={lang} />}
          {route === "agents" && <Agents lang={lang} />}
          {route === "settings" && <Settings lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} accent={accent} setAccent={setAccent} customColor={customColor} setCustomColor={setCustomColor} onLock={lock} />}
        </div>
      </main>
      <BottomNav route={route} setRoute={setRoute} lang={lang} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
