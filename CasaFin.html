<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CasaFin — Secure App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;550;600;650;700;750;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
/* ============================================================
   CasaFin — Secure App  ·  Design System
   Premium Swiss fintech, refined.  Light + Dark.
   ============================================================ */

:root {
  /* Type */
  --font-ui: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* Radii — Soft Depth: larger, softer */
  --r-xs: 10px;
  --r-sm: 14px;
  --r-md: 18px;
  --r-lg: 24px;
  --r-xl: 34px;
  --r-pill: 999px;

  /* Spacing rhythm */
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
  --sp-5: 24px; --sp-6: 32px; --sp-7: 48px; --sp-8: 64px;

  /* Motion */
  --ease: cubic-bezier(.22, .61, .36, 1);
  --ease-out: cubic-bezier(.16, 1, .3, 1);
  --dur: .28s;

  --sidebar-w: 268px;
  --maxw: 1240px;
}

/* ---------- Light (default) ---------- */
:root,
[data-theme="light"] {
  --bg:           #F4F4EF;
  --bg-grad-a:    #F7F7F2;
  --bg-grad-b:    #EDEEE7;
  --surface:      #FFFFFF;
  --surface-2:    #F6F6F1;
  --surface-3:    #EEEFE8;
  --glass:        rgba(255,255,255,.72);

  --ink:          #14161A;
  --ink-2:        #565B63;
  --ink-3:        #8B9098;
  --line:         #E4E4DC;
  --line-2:       #D7D8CE;

  --brand:        #B3C242;
  --brand-2:      #9AA836;
  --brand-ink:    #4E5A1C;
  --brand-soft:   #E9EECB;
  --brand-glow:   rgba(179,194,66,.18);

  --gold:         #C2862A;
  --gold-soft:    #F8F0DB;

  --danger:       #C2402F;
  --danger-soft:  #F7E3DF;
  --warn:         #B57A12;

  --pos:          #0E8A63;
  --neg:          #C2402F;

  --shadow-sm: 0 2px 6px rgba(40,46,20,.05), 0 1px 2px rgba(20,22,26,.04);
  --shadow-md: 0 12px 28px -8px rgba(40,46,20,.12), 0 4px 10px -4px rgba(20,22,26,.06);
  --shadow-lg: 0 28px 64px -16px rgba(40,46,20,.22), 0 10px 24px -10px rgba(20,22,26,.10);
  --shadow-brand: 0 16px 34px -12px var(--brand-glow), 0 4px 10px -4px var(--brand-glow);

  color-scheme: light;
}

/* ---------- Dark ---------- */
[data-theme="dark"] {
  --bg:           #0A0C0F;
  --bg-grad-a:    #0D1014;
  --bg-grad-b:    #07090B;
  --surface:      #14171C;
  --surface-2:    #1A1E24;
  --surface-3:    #20252C;
  --glass:        rgba(20,23,28,.66);

  --ink:          #F1F3F1;
  --ink-2:        #A4AAB2;
  --ink-3:        #6A7079;
  --line:         #262B32;
  --line-2:       #323841;

  --brand:        #BECA67;
  --brand-2:      #C9D47E;
  --brand-ink:    #D6DE9A;
  --brand-soft:   rgba(190,202,103,.16);
  --brand-glow:   rgba(190,202,103,.30);

  --gold:         #D6AC55;
  --gold-soft:    rgba(214,172,85,.14);

  --danger:       #E2705E;
  --danger-soft:  rgba(226,112,94,.14);
  --warn:         #E0A33C;

  --pos:          #2BB585;
  --neg:          #E2705E;

  --shadow-sm: 0 2px 8px rgba(0,0,0,.45);
  --shadow-md: 0 14px 32px -6px rgba(0,0,0,.5), 0 4px 12px -4px rgba(0,0,0,.4);
  --shadow-lg: 0 32px 70px -18px rgba(0,0,0,.72), 0 10px 26px -10px rgba(0,0,0,.5);
  --shadow-brand: 0 18px 40px -14px var(--brand-glow), 0 5px 12px -5px var(--brand-glow);

  color-scheme: dark;
}

/* ============================================================ Base */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "cv11", "ss01";
  line-height: 1.5;
  overflow: hidden;
}
#root { height: 100%; }
button, input, select, textarea { font: inherit; color: inherit; }
button { cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }
ul { list-style: none; }
:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: 4px; }
::selection { background: var(--brand-glow); }
.theme-switching * { transition: none !important; }

.num { font-variant-numeric: tabular-nums; letter-spacing: -.01em; }
.mono { font-family: var(--font-mono); }

/* scrollbars */
.scroll::-webkit-scrollbar { width: 10px; height: 10px; }
.scroll::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 99px; border: 3px solid transparent; background-clip: content-box; }
.scroll::-webkit-scrollbar-thumb:hover { background: var(--ink-3); background-clip: content-box; }

/* ============================================================ App layout */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: 100%;
  background:
    radial-gradient(1200px 700px at 78% -10%, rgba(179,194,66,.22), transparent 62%),
    linear-gradient(160deg, var(--bg-grad-a), var(--bg-grad-b));
}
.main {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
}
.main-inner {
  max-width: var(--maxw);
  margin: 0 auto;
  padding: 28px 40px 120px;
}

/* ============================================================ Sidebar */
.sidebar {
  height: 100%;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 22px 16px;
  background: var(--glass);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border-right: 1px solid var(--line);
}
.brand-row { display: flex; align-items: center; gap: 11px; padding: 6px 10px 18px; }
.brand-mark {
  width: 38px; height: 38px; border-radius: 11px;
  background: #0e1315;
  display: grid; place-items: center;
  box-shadow: var(--shadow-brand);
  flex-shrink: 0; overflow: hidden;
}
.brand-mark img { width: 100%; height: 100%; object-fit: cover; }
.brand-mark svg { width: 21px; height: 21px; }
.brand-name { font-weight: 750; font-size: 18px; letter-spacing: -.02em; }
.brand-name b { color: var(--brand); font-weight: 750; }
.brand-tag { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); margin-top: 1px; }

.nav-group-label { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .15em; text-transform: uppercase; color: var(--ink-3); padding: 14px 12px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: var(--r-sm);
  color: var(--ink-2); font-weight: 550; font-size: 14.5px;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  position: relative; width: 100%; text-align: left;
}
.nav-item svg { width: 19px; height: 19px; flex-shrink: 0; opacity: .85; }
.nav-item:hover { background: var(--surface-2); color: var(--ink); }
.nav-item.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }
.nav-item.active::before {
  content: ""; position: absolute; left: -16px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 20px; border-radius: 0 3px 3px 0; background: var(--brand);
}
.nav-item.active svg { opacity: 1; color: var(--brand); }
.nav-badge { margin-left: auto; font-size: 10.5px; font-weight: 700; padding: 1px 7px; border-radius: 99px; background: var(--brand-soft); color: var(--brand-ink); font-family: var(--font-mono); }
.nav-lock { margin-left: auto; opacity: .55; }

.sidebar-spacer { flex: 1; }

/* Pioneer card in sidebar */
.pioneer-card {
  margin-top: 8px; padding: 14px; border-radius: var(--r-md);
  background: linear-gradient(155deg, var(--gold-soft), transparent);
  border: 1px solid var(--line);
  position: relative; overflow: hidden;
}
.pioneer-card .pk-k { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); display:flex; align-items:center; gap:6px; }
.pioneer-card .pk-t { font-size: 13px; color: var(--ink-2); margin: 7px 0 11px; line-height: 1.4; }

/* ============================================================ Topbar */
.topbar {
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0 16px;
  margin-bottom: 8px;
}
.topbar.stuck { /* handled inline by blur wrapper */ }
.tb-greet h1 { font-size: 25px; font-weight: 760; letter-spacing: -.025em; line-height: 1.18; margin: 0; white-space: nowrap; }
.tb-greet h1 em { font-style: normal; color: var(--ink); }
.tb-greet p { font-size: 13.5px; color: var(--ink-2); margin-top: 5px; line-height: 1.3; }
.tb-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

/* segmented toggle (lang / theme) */
.seg { display: inline-flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-pill); padding: 3px; gap: 2px; }
.seg button { padding: 5px 11px; border-radius: var(--r-pill); font-size: 12.5px; font-weight: 650; color: var(--ink-3); transition: all var(--dur) var(--ease); display:flex; align-items:center; gap:5px; }
.seg button.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }
.seg button svg { width: 15px; height: 15px; }

.icon-btn {
  width: 40px; height: 40px; border-radius: var(--r-sm);
  display: grid; place-items: center; color: var(--ink-2);
  background: var(--surface); border: 1px solid var(--line);
  transition: all var(--dur) var(--ease);
}
.icon-btn:hover { color: var(--ink); border-color: var(--line-2); transform: translateY(-1px); }
.icon-btn svg { width: 18px; height: 18px; }

.avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(150deg, var(--brand), var(--brand-2)); color: #1E2607; display: grid; place-items: center; font-weight: 700; font-size: 14px; box-shadow: var(--shadow-sm); }

/* ============================================================ Cards & primitives */
.card {
  background: var(--glass);
  -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(16px);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-md);
}
.card-pad { padding: 22px; }
.card-h { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.card-h h3 { font-size: 15px; font-weight: 680; letter-spacing: -.01em; }
.card-h .more { margin-left: auto; font-size: 12.5px; color: var(--ink-3); font-weight: 600; display:flex; align-items:center; gap:3px; }
.card-h .more:hover { color: var(--brand); }

.eyebrow { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); }
.sec-title { font-size: 22px; font-weight: 740; letter-spacing: -.025em; }
.sec-title em { font-style: normal; color: var(--brand); }

.grid { display: grid; gap: 18px; }
.cols-2 { grid-template-columns: repeat(2, 1fr); }
.cols-3 { grid-template-columns: repeat(3, 1fr); }
.cols-4 { grid-template-columns: repeat(4, 1fr); }

/* chips / badges */
.chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: var(--r-pill); background: var(--surface-2); color: var(--ink-2); border: 1px solid var(--line); }
.chip.pos { background: var(--brand-soft); color: var(--brand-ink); border-color: transparent; }
.chip.neg { background: var(--danger-soft); color: var(--neg); border-color: transparent; }
.chip.gold { background: var(--gold-soft); color: var(--gold); border-color: transparent; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }

/* buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-weight: 650; font-size: 14px; padding: 11px 18px; border-radius: var(--r-sm); transition: all var(--dur) var(--ease); border: 1px solid transparent; }
.btn svg { width: 17px; height: 17px; }
.btn-primary { background: var(--brand); color: #1E2607; box-shadow: var(--shadow-brand); }
.btn-primary:hover { background: var(--brand-2); transform: translateY(-1px); }
.btn-ghost { background: var(--surface); border-color: var(--line); color: var(--ink); }
.btn-ghost:hover { border-color: var(--line-2); transform: translateY(-1px); }
.btn-gold { background: linear-gradient(150deg, var(--gold), color-mix(in oklab, var(--gold), #000 14%)); color: #fff; }
.btn-gold:hover { transform: translateY(-1px); filter: brightness(1.05); }
.btn-block { width: 100%; }
.btn-lg { padding: 14px 22px; font-size: 15px; }

/* stat tiles */
.stat { padding: 20px 22px; border-radius: var(--r-lg); background: var(--glass); -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px); border: 1px solid var(--line); box-shadow: var(--shadow-md); position: relative; overflow: hidden; }
.stat .k { font-size: 12.5px; color: var(--ink-2); font-weight: 600; display:flex; align-items:center; gap:7px; }
.stat .v { font-size: 27px; font-weight: 760; letter-spacing: -.03em; margin-top: 9px; }
.stat .s { font-size: 12px; margin-top: 5px; color: var(--ink-3); font-weight: 600; }

.measure-row { display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:650; }
.up { color: var(--pos); } .down { color: var(--neg); }

/* progress */
.bar { height: 8px; border-radius: 99px; background: var(--surface-3); overflow: hidden; }
.bar > i { display: block; height: 100%; border-radius: 99px; background: var(--brand); }

/* list rows */
.row { display: flex; align-items: center; gap: 13px; padding: 12px 0; border-bottom: 1px solid var(--line); }
.row:last-child { border-bottom: none; }
.row .ic { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; background: var(--surface-2); flex-shrink: 0; font-size: 17px; }
.row .nm { font-weight: 620; font-size: 14px; }
.row .sub { font-size: 12px; color: var(--ink-3); margin-top: 1px; }
.row .amt { margin-left: auto; font-weight: 700; font-size: 14.5px; }

/* tag pill for security */
.seclabel { display:inline-flex; align-items:center; gap:6px; font-family: var(--font-mono); font-size: 10.5px; letter-spacing:.08em; text-transform:uppercase; color: var(--brand-ink); background: var(--brand-soft); padding: 4px 9px; border-radius: 6px; }

/* inputs */
.field { display: block; }
.field label { display:block; font-size: 12.5px; font-weight: 620; color: var(--ink-2); margin-bottom: 7px; }
.input { width: 100%; padding: 12px 14px; border-radius: var(--r-sm); background: var(--surface-2); border: 1px solid var(--line); font-size: 14.5px; transition: all var(--dur) var(--ease); }
.input:focus { outline: none; border-color: var(--brand); background: var(--surface); box-shadow: 0 0 0 3px var(--brand-glow); }
.input::placeholder { color: var(--ink-3); }

/* ============================================================ Bottom nav (mobile) */
.bottomnav { display: none; }

/* ============================================================ Auth */
.auth-wrap {
  height: 100%; display: grid; grid-template-columns: 1.05fr 1fr;
  background: linear-gradient(160deg, var(--bg-grad-a), var(--bg-grad-b));
}
.auth-aside {
  position: relative; padding: 44px; display: flex; flex-direction: column;
  background:
    radial-gradient(700px 460px at 18% 8%, rgba(255,255,255,.10), transparent 60%),
    linear-gradient(165deg, #586B22, color-mix(in oklab, #586B22, #000 40%));
  color: #fff; overflow: hidden;
}
.auth-aside::after { content: none; }
.auth-aside-top { position: relative; z-index: 1; }
.auth-aside-mid { position: relative; z-index: 1; margin-top: auto; }
.lockviz {
  width: 78px; height: 78px; border-radius: 22px; display: grid; place-items: center;
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
  color: #fff; margin-bottom: 26px; -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
}
.auth-aside-mid h2 { font-size: 32px; font-weight: 760; letter-spacing: -.03em; line-height: 1.08; max-width: 12ch; }
.auth-aside-mid p { font-size: 15px; color: rgba(255,255,255,.78); margin-top: 16px; max-width: 38ch; line-height: 1.55; }
.auth-aside-foot { position: relative; z-index: 1; display: flex; gap: 8px; margin-top: 40px; }

.auth-main { display: flex; flex-direction: column; padding: 36px; position: relative; }
.auth-topctrl { display: flex; gap: 8px; justify-content: flex-end; }
.auth-card { margin: auto; width: 100%; max-width: 420px; }
.auth-icon { width: 54px; height: 54px; border-radius: 16px; display: grid; place-items: center; background: var(--brand-soft); color: var(--brand); margin-bottom: 22px; }
.auth-h { font-size: 28px; font-weight: 770; letter-spacing: -.03em; }
.auth-p { font-size: 14.5px; color: var(--ink-2); margin: 10px 0 26px; line-height: 1.55; }
.auth-err { background: var(--danger-soft); color: var(--neg); font-size: 13px; font-weight: 600; padding: 10px 14px; border-radius: var(--r-sm); margin-bottom: 14px; }
.auth-link { display: block; width: 100%; text-align: center; margin-top: 16px; font-size: 13px; font-weight: 600; color: var(--ink-3); }
.auth-link:hover { color: var(--brand); }
.auth-foot-note { display: flex; align-items: center; justify-content: center; gap: 7px; margin-top: 22px; font-size: 12px; color: var(--ink-3); }

.phrase-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 22px; }
.phrase-chip { display: flex; align-items: center; gap: 11px; padding: 12px 14px; border-radius: var(--r-sm); background: var(--surface-2); border: 1px solid var(--line); }
.phrase-chip .pc-i { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); width: 14px; }
.phrase-chip .mono { font-size: 15px; font-weight: 600; }
.ack { display: flex; align-items: center; gap: 11px; margin-bottom: 20px; font-size: 13.5px; color: var(--ink-2); cursor: pointer; }
.ack input { width: 18px; height: 18px; accent-color: var(--brand); }
.otp { text-align: center; font-size: 30px; letter-spacing: .42em; padding: 16px; font-weight: 600; }

@media (max-width: 860px) {
  .auth-wrap { grid-template-columns: 1fr; }
  .auth-aside { display: none; }
  .auth-main { padding: 22px 18px; }
}

/* ============================================================ Animations */
@keyframes fadeUp { from { transform: translateY(12px); } to { transform: none; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pop { from { transform: scale(.97); } to { transform: none; } }
@keyframes ringSpin { to { transform: rotate(360deg); } }
.animate > * { animation: fadeUp .5s var(--ease-out) both; }
.animate > *:nth-child(2) { animation-delay: .05s; }
.animate > *:nth-child(3) { animation-delay: .1s; }
.animate > *:nth-child(4) { animation-delay: .15s; }
.animate > *:nth-child(5) { animation-delay: .2s; }
.animate > *:nth-child(6) { animation-delay: .25s; }
@media (prefers-reduced-motion: reduce) { .animate > * { animation: none !important; } }

/* ============================================================ Responsive */
@media (max-width: 1100px) {
  .main-inner { padding: 22px 26px 120px; }
  .cols-4 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main-inner { padding: 18px 16px 110px; }
  .cols-3 { grid-template-columns: 1fr; }
  .cols-2 { grid-template-columns: 1fr; }
  .bottomnav {
    display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--glass); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
    border-top: 1px solid var(--line); padding: 9px 6px calc(9px + env(safe-area-inset-bottom));
    justify-content: space-around;
  }
  .bn-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 5px 10px; border-radius: var(--r-sm); color: var(--ink-3); font-size: 10px; font-weight: 650; flex: 1; }
  .bn-item svg { width: 21px; height: 21px; }
  .bn-item.active { color: var(--brand); }
  .tb-greet h1 { font-size: 21px; }
  .topbar { flex-wrap: wrap; }
}
@media (max-width: 480px) {
  .sec-title { font-size: 19px; }
  .stat .v { font-size: 23px; }
}

/* ============================================================ Components (screens) */
.screen-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.screen-toolbar .btn, .screen-toolbar .seg { margin-left: auto; }
.screen-toolbar .seclabel + .seg { margin-left: auto; }

/* fina orb */
.fina-orb { width: 34px; height: 34px; border-radius: 11px; display: grid; place-items: center; color: #fff; flex-shrink: 0;
  background: linear-gradient(150deg, var(--brand), var(--brand-2)); box-shadow: var(--shadow-brand); }
.fina-orb.lg { width: 46px; height: 46px; border-radius: 14px; }
.fina-cta { background: linear-gradient(165deg, var(--brand-soft), transparent); }

/* accounts table */
.acc-table-h, .acc-row { display: grid; grid-template-columns: 2.2fr 1fr 1.3fr 1fr 1fr; align-items: center; gap: 12px; padding: 14px 22px; }
.acc-table-h { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); background: var(--surface-2); border-bottom: 1px solid var(--line); }
.acc-row { border-bottom: 1px solid var(--line); transition: background var(--dur); }
.acc-row:hover { background: var(--surface-2); }
.bank-badge { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; background: var(--surface-3); font-family: var(--font-mono); font-weight: 700; font-size: 13px; color: var(--ink-2); flex-shrink: 0; }
.acc-foot { display: flex; align-items: center; gap: 10px; padding: 16px 22px; background: var(--surface-2); }
.mini-edit { color: var(--ink-3); padding: 4px; border-radius: 6px; }
.mini-edit:hover { color: var(--brand); background: var(--surface-2); }

/* modal */
.modal-backdrop { position: fixed; inset: 0; z-index: 100; background: rgba(10,12,15,.5); -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); display: grid; place-items: center; padding: 20px; animation: fadeIn .2s ease; }
.modal { width: 100%; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--shadow-lg); animation: pop .26s var(--ease-out); max-height: 88vh; display: flex; flex-direction: column; }
.modal-h { display: flex; align-items: center; padding: 20px 22px; border-bottom: 1px solid var(--line); }
.modal-h h3 { font-size: 16px; font-weight: 700; }
.modal-h .icon-btn { margin-left: auto; }
.modal-body { padding: 22px; overflow-y: auto; overflow-x: hidden; }
.modal-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 22px; border-top: 1px solid var(--line); }

/* toggle */
.toggle { width: 44px; height: 26px; border-radius: 99px; background: var(--surface-3); border: 1px solid var(--line); position: relative; transition: background var(--dur) var(--ease); flex-shrink: 0; }
.toggle .knob { position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; box-shadow: var(--shadow-sm); transition: transform var(--dur) var(--ease); }
.toggle.on { background: var(--brand); border-color: transparent; }
.toggle.on .knob { transform: translateX(18px); }

/* dropzone */
.dropzone { border: 2px dashed var(--line-2); border-radius: var(--r-lg); padding: 40px; text-align: center; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all var(--dur) var(--ease); background: var(--surface); }
.dropzone:hover { border-color: var(--brand); background: var(--brand-soft); }
.dropzone.over { border-color: var(--brand); background: var(--brand-soft); transform: scale(1.005); }
.dz-icon { width: 60px; height: 60px; border-radius: 18px; display: grid; place-items: center; background: var(--brand-soft); color: var(--brand); margin-bottom: 14px; }

/* doc cards */
.doc-card { display: flex; gap: 13px; padding: 14px; border-radius: var(--r-md); border: 1px solid var(--line); background: var(--surface-2); }
.doc-fields { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 9px; font-size: 12px; color: var(--ink-2); align-items: center; }
.doc-fields b { color: var(--ink-3); font-weight: 600; }

/* agent cards */
.agent-card { transition: box-shadow var(--dur), transform var(--dur); }
.agent-card.pulse { box-shadow: 0 0 0 2px var(--brand), var(--shadow-md); }
.agent-badge { width: 42px; height: 42px; border-radius: 13px; display: grid; place-items: center; background: var(--brand-soft); color: var(--brand); flex-shrink: 0; }
.agent-status { font-size: 11px; font-weight: 650; display: inline-flex; align-items: center; gap: 5px; padding: 4px 9px; border-radius: 99px; }
.agent-status.on { background: var(--brand-soft); color: var(--brand-ink); }
.agent-status.off { background: var(--surface-3); color: var(--ink-3); }
.agent-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-top: 14px; border-top: 1px solid var(--line); }
.am-k { font-size: 10.5px; color: var(--ink-3); font-family: var(--font-mono); letter-spacing: .06em; text-transform: uppercase; }
.am-v { font-size: 13.5px; font-weight: 650; margin-top: 3px; }

/* settings */
.set-row { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--line); }
.set-row:last-child { border-bottom: none; }
.set-ic { width: 38px; height: 38px; border-radius: 11px; display: grid; place-items: center; background: var(--surface-2); color: var(--ink-2); flex-shrink: 0; }
.set-ic.danger { background: var(--danger-soft); color: var(--neg); }
.audit-row { display: flex; align-items: center; gap: 12px; padding: 11px 4px; border-bottom: 1px solid var(--line); }
.audit-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brand); flex-shrink: 0; }
.demo-pill { margin-left: auto; align-self: flex-start; font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase; font-weight: 600; color: var(--gold); background: var(--gold-soft); padding: 3px 8px; border-radius: 6px; }
.demo-pill.light { color: #fff; background: rgba(255,255,255,.18); }
.demo-card { background: linear-gradient(160deg, var(--gold-soft), transparent); }
.accent-swatches { display: flex; gap: 8px; }
.accent-swatch { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; color: #fff; border: 2px solid transparent; box-shadow: var(--shadow-sm); transition: transform var(--dur) var(--ease); }
.accent-swatch:hover { transform: scale(1.1); }
.accent-swatch.on { border-color: var(--ink); outline: 2px solid var(--surface); outline-offset: -4px; }
.accent-swatch.custom { position: relative; overflow: hidden; }

/* bill / sub rows */
.bill-row { display: flex; align-items: center; gap: 13px; padding: 12px 14px; border-radius: var(--r-md); border: 1px solid var(--line); background: var(--surface-2); transition: border-color var(--dur); }
.bill-row:hover { border-color: var(--line-2); }
.bill-row .nm { font-weight: 640; font-size: 14px; }
.bill-row .sub { font-size: 12px; color: var(--ink-3); margin-top: 1px; }

/* QR scan */
.scan-frame { display: flex; flex-direction: column; align-items: center; }
.scan-box { width: 180px; height: 180px; border-radius: var(--r-lg); display: grid; place-items: center; color: var(--ink-3); background: var(--surface-2); border: 2px dashed var(--line-2); position: relative; overflow: hidden; }
.scan-box.active { color: var(--brand); border-color: var(--brand); }
.scan-line { position: absolute; left: 8%; right: 8%; height: 2px; background: var(--brand); box-shadow: 0 0 12px var(--brand); top: 10%; animation: scanMove 1.4s ease-in-out infinite; }
@keyframes scanMove { 0%,100% { top: 12%; } 50% { top: 86%; } }

/* goals */
.goal-card { transition: transform var(--dur), box-shadow var(--dur); }
.goal-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.goal-emoji { width: 46px; height: 46px; border-radius: 13px; display: grid; place-items: center; font-size: 22px; background: var(--surface-2); border: 1px solid var(--line); flex-shrink: 0; }

/* family */
.member-card { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 18px 10px; border-radius: var(--r-md); border: 1px solid var(--line); background: var(--surface-2); }
.emergency-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.em-item { padding: 12px 14px; border-radius: var(--r-md); background: var(--surface); border: 1px solid var(--line); }
.em-k { font-size: 11px; font-family: var(--font-mono); letter-spacing: .06em; text-transform: uppercase; color: var(--ink-3); }
.em-v { font-size: 19px; font-weight: 760; margin-top: 4px; }
.em-s { font-size: 11.5px; color: var(--ink-3); margin-top: 1px; }

/* business P&L */
.konto{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--ink-3);background:var(--surface-3);border-radius:6px;padding:4px 7px;align-self:center;min-width:42px;text-align:center}
.pl-sec{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px}
.pl-total{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;margin-top:4px;font-weight:680;font-size:14px;border-top:1px solid var(--line)}
.pl-profit{display:flex;justify-content:space-between;align-items:center;padding:16px;margin-top:14px;border-radius:var(--r-md);background:var(--brand-soft);font-weight:760;font-size:17px;color:var(--brand-ink)}
.vat-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;font-size:14px;border-bottom:1px solid var(--line)}
.vat-row small{color:var(--ink-3);font-weight:500}
.vat-row.total{border-bottom:none;font-weight:720;font-size:15px;border-top:2px solid var(--line);margin-top:2px;padding-top:12px}

/* ===== CasaFin signature icon style (circle ring + compass north-point) ===== */
.set-ic, .agent-badge, .auth-icon, .dz-icon, .fina-orb {
  border-radius: 50% !important;
  position: relative;
  border: 1.5px solid color-mix(in oklab, var(--brand), transparent 58%);
}
.agent-badge::after, .auth-icon::after, .dz-icon::after, .fina-orb::after {
  content: ""; position: absolute; top: -3px; left: 50%; transform: translateX(-50%);
  width: 6px; height: 6px; border-radius: 50%; background: var(--brand);
  box-shadow: 0 0 0 3px var(--surface);
}
.fina-orb { border-color: rgba(255,255,255,.35); }
.fina-orb::after { box-shadow: 0 0 0 3px var(--surface); }
.set-ic.danger { border-color: color-mix(in oklab, var(--neg), transparent 60%); }

.bubble.me { align-self: flex-end; background: var(--brand); color: #fff; border-bottom-right-radius: 5px; }

.bubble.thinking span:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%, 60%, 100% { opacity: .25; } 30% { opacity: 1; } }
.suggest { margin-top: 6px; }
.suggest-chips { display: flex; flex-direction: column; gap: 8px; }
.sg-chip { text-align: left; padding: 11px 14px; border-radius: var(--r-sm); background: var(--surface); border: 1px solid var(--line); font-size: 13px; font-weight: 550; color: var(--ink-2); transition: all var(--dur); }
.sg-chip:hover { border-color: var(--brand); color: var(--ink); background: var(--brand-soft); }
.fina-input { display: flex; gap: 9px; padding: 14px 18px; border-top: 1px solid var(--line); }
.fina-input .input { flex: 1; }
.fina-input .btn { padding: 0 16px; }
.fina-disc { font-size: 11px; color: var(--ink-3); text-align: center; padding: 0 0 12px; }
.fina-summary { background: linear-gradient(165deg, var(--brand-soft), transparent); }
.action-card { transition: transform var(--dur), box-shadow var(--dur); }
.action-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

  .acc-row > :nth-child(2) { grid-area: c; }
  .acc-row > :nth-child(3) { grid-area: b; }

/* ============================================================
   CasaFin — formatting helpers
   ============================================================ */
(function () {
  function chf(n, opts = {}) {
    const neg = n < 0;
    const v = Math.abs(n);
    const s = v.toLocaleString("de-CH", {
      minimumFractionDigits: opts.dp ?? 0,
      maximumFractionDigits: opts.dp ?? 0,
    }).replace(/\u2019/g, "'");
    const out = (opts.noCur ? "" : "CHF ") + s;
    return (neg ? "–" : (opts.sign ? "+" : "")) + out;
  }
  function compact(n) {
    if (Math.abs(n) >= 1000) return (n / 1000).toLocaleString("de-CH", { maximumFractionDigits: 0 }) + "k";
    return String(n);
  }
  function date(iso, lang = "de") {
    const d = new Date(iso);
    return d.toLocaleDateString(lang === "de" ? "de-CH" : "en-GB", { day: "2-digit", month: "short", year: "numeric" });
  }
  function timeAgo(ts, lang = "de") {
    const d = new Date(ts);
    return d.toLocaleString(lang === "de" ? "de-CH" : "en-GB", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
  }
  window.fmt = { chf, compact, date, timeAgo };
})();

    try { return await c.auth.signUp({ email: email, password: password, options: { data: { name: name || "" } } }); }
    catch (e) { return { error: { message: String(e) } }; }
  }
  async function signIn(email, password) {
    if (!TRIAL_ENABLED) return { skipped: true };
    var c = sb(); if (!c) return { error: { message: "offline" } };
    try { return await c.auth.signInWithPassword({ email: email, password: password }); }
    catch (e) { return { error: { message: String(e) } }; }
  }
  async function signOut() { var c = sb(); if (c) try { await c.auth.signOut(); } catch (e) {} }
  async function fetchAccess() {
    var c = sb(); if (!c) return null;
    try {
      var u = await c.auth.getUser();
      var user = u && u.data ? u.data.user : null;
      if (!user) return null;
      var r = await c.from("subscriptions").select("status,plan,trial_ends_at").eq("user_id", user.id).single();
      if (r.error || !r.data) return { status: "unknown", hasAccess: true, days: null };
      var ends = new Date(r.data.trial_ends_at).getTime();
      var days = Math.max(0, Math.ceil((ends - Date.now()) / 86400000));
      var hasAccess = r.data.status === "active" || (r.data.status === "trialing" && ends > Date.now());
      return { status: r.data.status, plan: r.data.plan, trialEndsAt: r.data.trial_ends_at, days: days, hasAccess: hasAccess };
    } catch (e) { return { status: "unknown", hasAccess: true, days: null }; }
  }

/* ============================================================
   CasaFin — Charts (pure SVG, theme-aware via CSS vars)
   ============================================================ */
const { useState: useStateC, useEffect: useEffectC, useId } = React;

/* ---------- Health ring ---------- */
function HealthRing({ value = 0, size = 132, stroke = 11 }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const [p, setP] = useStateC(0);
  useEffectC(() => { const t = setTimeout(() => setP(value), 120); return () => clearTimeout(t); }, [value]);
  const off = c - (p / 100) * c;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="var(--surface-3)" strokeWidth={stroke} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="var(--brand)" strokeWidth={stroke}
        strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off}
        style={{ transition: "stroke-dashoffset 1.1s cubic-bezier(.16,1,.3,1)" }} />
    </svg>
  );
}

/* ---------- Net-worth area line ---------- */
function NetWorthLine({ series = [], height = 150 }) {
  const gid = useId().replace(/:/g, "");
  const w = 560, h = height, pad = 8;
  const min = Math.min(...series), max = Math.max(...series);
  const span = max - min || 1;
  const pts = series.map((v, i) => {
    const x = pad + (i / (series.length - 1)) * (w - pad * 2);
    const y = pad + (1 - (v - min) / span) * (h - pad * 2 - 14) + 7;
    return [x, y];
  });
  const line = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const area = line + ` L${(w - pad).toFixed(1)} ${h} L${pad} ${h} Z`;
  const last = pts[pts.length - 1];
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} preserveAspectRatio="none" style={{ display: "block" }}>
      <defs>
        <linearGradient id={"g" + gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="var(--brand)" stopOpacity="0.22" />
          <stop offset="100%" stopColor="var(--brand)" stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#g${gid})`} />
      <path d={line} fill="none" stroke="var(--brand)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={last[0]} cy={last[1]} r="4.5" fill="var(--brand)" stroke="var(--surface)" strokeWidth="2.5" />
    </svg>
  );
}

/* ---------- Category donut ---------- */
const DONUT_COLORS = ["var(--brand)", "#5BB8E8", "#E8A33C", "#B07CE0", "#E8746B", "#5AC6A0"];
function CategoryDonut({ categories = [], size = 180 }) {
  const stroke = 26, r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const total = categories.reduce((s, x) => s + x.spent, 0) || 1;
  let acc = 0;
  const [mounted, setMounted] = useStateC(false);
  useEffectC(() => { const t = setTimeout(() => setMounted(true), 100); return () => clearTimeout(t); }, []);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <g transform={`rotate(-90 ${size / 2} ${size / 2})`}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="var(--surface-3)" strokeWidth={stroke} />
        {categories.map((cat, i) => {
          const frac = cat.spent / total;
          const dash = mounted ? frac * c : 0;
          const el = (
            <circle key={cat.id} cx={size / 2} cy={size / 2} r={r} fill="none"
              stroke={DONUT_COLORS[i % DONUT_COLORS.length]} strokeWidth={stroke}
              strokeDasharray={`${dash} ${c - dash}`} strokeDashoffset={-acc * c}
              style={{ transition: "stroke-dasharray 1s cubic-bezier(.16,1,.3,1)" }} />
          );
          acc += frac;
          return el;
        })}
      </g>
    </svg>
  );
}

/* ---------- Mini month bars ---------- */
function MiniBars({ data = [], height = 60 }) {
  const max = Math.max(...data.map(d => d.v), 1);
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6, height: "100%" }}>
          <div style={{ flex: 1, width: "100%", display: "flex", alignItems: "flex-end" }}>
            <div style={{
              width: "100%", height: `${(d.v / max) * 100}%`, minHeight: 4,
              background: d.on ? "var(--brand)" : "var(--surface-3)",
              borderRadius: 6, transition: "height .8s cubic-bezier(.16,1,.3,1)",
            }} />
          </div>
          <span style={{ fontSize: 10.5, color: "var(--ink-3)", fontWeight: 600 }}>{d.label}</span>
        </div>
      ))}
    </div>
  );
}

/* ---------- Sparkline ---------- */
function Sparkline({ series = [], width = 84, height = 30, color = "var(--brand)" }) {
  const min = Math.min(...series), max = Math.max(...series), span = max - min || 1;
  const pts = series.map((v, i) => {
    const x = (i / (series.length - 1)) * width;
    const y = (1 - (v - min) / span) * (height - 4) + 2;
    return x.toFixed(1) + " " + y.toFixed(1);
  });
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

Object.assign(window, { HealthRing, NetWorthLine, CategoryDonut, MiniBars, Sparkline, DONUT_COLORS });

  </script>

function pwStrength(pw) {
  let s = 0;
  if (pw.length >= 8) s++;

}

function PwField({ value, onChange, placeholder, autoFocus, onEnter }) {
  const [show, setShow] = useStateA(false);
  return (
    <div style={{ position: "relative" }}>
      <input className="input mono" type={show ? "text" : "password"} value={value} autoFocus={autoFocus}
        placeholder={placeholder} onChange={(e) => onChange(e.target.value)}
        onKeyDown={(e) => e.key === "Enter" && onEnter && onEnter()}
        style={{ paddingRight: 44, letterSpacing: show ? 0 : "0.18em" }} />
      <button onClick={() => setShow(!show)} aria-label="toggle"
        style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", color: "var(--ink-3)", padding: 6 }}>
        <Icon name="eye" size={17} />
      </button>
    </div>
  );
}

function AuthShell({ lang, setLang, theme, setTheme, children, sub }) {
  const T = (k) => window.I18N.t(k, lang);
  return (
    <div className="auth-wrap">
      <div className="auth-aside">
        <div className="auth-aside-top">
          <div className="brand-row" style={{ padding: 0 }}>
            <BrandMark />
            <div>
              <div className="brand-name" style={{ color: "#fff" }}>Casa<b style={{ color: "#fff" }}>Fin</b></div>
              <div className="brand-tag" style={{ color: "rgba(255,255,255,.6)" }}>{T("app.tag")}</div>
            </div>
            <span className="demo-pill light">{window.I18N.t("demo.badge", lang)}</span>
          </div>
        </div>
        <div className="auth-aside-mid">
          <div className="lockviz"><Icon name="shield" size={40} sw={1.4} /></div>
          <h2>{lang === "de" ? "Deine Finanzen. Verschlüsselt. Schweizerisch." : "Your finances. Encrypted. Swiss."}</h2>
          <p>{sub}</p>
        </div>
        <div className="auth-aside-foot">
          <span className="seclabel" style={{ color: "#fff", background: "rgba(255,255,255,.14)" }}><Icon name="lock" size={12} /> AES-256</span>
          <span className="seclabel" style={{ color: "#fff", background: "rgba(255,255,255,.14)" }}>CH-Server</span>
          <span className="seclabel" style={{ color: "#fff", background: "rgba(255,255,255,.14)" }}>DSG</span>
        </div>
      </div>

      <div className="auth-main">
        <div className="auth-topctrl">
          <div className="seg"><button className={lang === "de" ? "on" : ""} onClick={() => setLang("de")}>DE</button><button className={lang === "en" ? "on" : ""} onClick={() => setLang("en")}>EN</button></div>
          <div className="seg"><button className={theme === "light" ? "on" : ""} onClick={() => setTheme("light")}><Icon name="sun" size={15} /></button><button className={theme === "dark" ? "on" : ""} onClick={() => setTheme("dark")}><Icon name="moon" size={15} /></button></div>
        </div>
        <div className="auth-card">{children}</div>
      </div>
    </div>
  );
}

function AuthScreen({ lang, setLang, theme, setTheme, onUnlocked }) {
  const T = (k) => window.I18N.t(k, lang);
  const hasVault = window.Vault.hasVault();
  const [mode, setMode] = useStateA(hasVault ? "unlock" : "create");
  const [pw, setPw] = useStateA("");
  const [pw2, setPw2] = useStateA("");
  const [err, setErr] = useStateA("");
  const [busy, setBusy] = useStateA(false);
  const [phrase, setPhrase] = useStateA([]);
  const [ack, setAck] = useStateA(false);
  const [code, setCode] = useStateA("");
  const [recPhrase, setRecPhrase] = useStateA("");
  const [name, setName] = useStateA("");
  const [email, setEmail] = useStateA("");

  const strength = pwStrength(pw);
  const strengthLabel = [T("sec.weak"), T("sec.weak"), T("sec.fair"), T("sec.good"), T("sec.strong")][strength];
  const strengthColor = ["var(--neg)", "var(--neg)", "var(--warn)", "var(--brand)", "var(--brand)"][strength];

  async function doCreate() {
    setErr("");
    if (!email.trim()) return setErr(T("sec.emailRequired"));
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) return setErr(T("sec.emailInvalid"));
    if (pw.length < 8) return setErr(T("sec.tooShort"));
    if (pw !== pw2) return setErr(T("sec.mismatch"));
    setBusy(true);
    const ph = await window.Vault.create(pw, name.trim(), email.trim());
    window.Vault.setPrefs({ accEmail: email.trim() });
    if (window.CasaAuth) window.CasaAuth.signUp(email.trim(), pw, name.trim());
    setBusy(false);
    setPhrase(ph);
    setMode("recovery");
  }

  async function doUnlock() {
    setErr(""); setBusy(true);
    const ok = await window.Vault.unlock(pw);
    setBusy(false);
    if (!ok) { setErr(T("sec.wrong")); return; }
    try { const _pe = window.Vault.getPrefs().accEmail; if (window.CasaAuth && _pe) window.CasaAuth.signIn(_pe, pw); } catch (e) {}
    if (window.Vault.data.settings.twoFa) setMode("twofa");
    else onUnlocked();
  }

  function doTwoFa() {
    setErr("");
    if (code.length !== 6) return setErr(T("sec.wrong"));
    window.Vault.logPersist("2fa.verified", "2FA bestätigt");
    onUnlocked();
  }

  async function doRecover() {
    setErr("");
    if (pw.length < 8) return setErr(T("sec.tooShort"));
    setBusy(true);
    const ok = await window.Vault.recover(recPhrase, pw);
    setBusy(false);
    if (!ok) return setErr(lang === "de" ? "Phrase ungültig." : "Invalid phrase.");
    onUnlocked();
  }

  const asideSub = {
    create: T("sec.setupSub"),
    recovery: T("sec.recoverySub"),
    unlock: lang === "de" ? "Alle Daten sind mit deinem Master-Passwort verschlüsselt — nur auf diesem Gerät." : "All data is encrypted with your master password — on this device only.",
    twofa: lang === "de" ? "Zusätzlicher Schutz durch Zwei-Faktor-Authentifizierung." : "Extra protection via two-factor authentication.",
    recover: lang === "de" ? "Mit deiner Wiederherstellungs-Phrase erhältst du wieder Zugang." : "Regain access with your recovery phrase.",
  }[mode];

  return (
    <AuthShell lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} sub={asideSub}>
      {/* ---------- CREATE ---------- */}
      {mode === "create" && (
        <div className="animate">
          <div className="auth-icon"><Icon name="key" size={22} /></div>
          <h1 className="auth-h">{T("sec.setupTitle")}</h1>
          <p className="auth-p">{T("sec.setupSub")}</p>
          <div className="field" style={{ marginBottom: 14 }}>
            <label>{T("sec.name")}</label>
            <input className="input" value={name} autoFocus placeholder={lang === "de" ? "Vorname oder Familienname" : "First name or family name"} onChange={(e) => setName(e.target.value)} />
          </div>
          <div className="field" style={{ marginBottom: 14 }}>
            <label>{T("sec.email")}</label>
            <input className="input" type="email" value={email} placeholder={T("sec.emailPlaceholder")} onChange={(e) => setEmail(e.target.value)} />
          </div>
          <div className="field" style={{ marginBottom: 14 }}>
            <label>{T("sec.master")}</label>
            <PwField value={pw} onChange={setPw} placeholder="••••••••••••" />
            {pw && (
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 9 }}>
                <div className="bar" style={{ flex: 1 }}><i style={{ width: `${(strength / 4) * 100}%`, background: strengthColor, transition: "all .3s" }} /></div>
                <span style={{ fontSize: 11.5, fontWeight: 650, color: strengthColor }}>{strengthLabel}</span>
              </div>
            )}
          </div>
          <div className="field" style={{ marginBottom: 18 }}>
            <label>{T("sec.masterConfirm")}</label>
            <PwField value={pw2} onChange={setPw2} placeholder="••••••••••••" onEnter={doCreate} />
          </div>
          {err && <div className="auth-err">{err}</div>}
          <button className="btn btn-primary btn-block btn-lg" onClick={doCreate} disabled={busy}>
            {busy ? "…" : <>{T("sec.create")} <Icon name="arrow" size={17} /></>}
          </button>
          <div className="auth-foot-note"><Icon name="shield" size={14} /> {T("sec.encrypted")} · {T("sec.localOnly")}</div>
        </div>
      )}

      {/* ---------- RECOVERY PHRASE ---------- */}
      {mode === "recovery" && (
        <div className="animate">
          <div className="auth-icon"><Icon name="shield" size={22} /></div>
          <h1 className="auth-h">{T("sec.recoveryTitle")}</h1>
          <p className="auth-p">{T("sec.recoverySub")}</p>
          <div className="phrase-grid">
            {phrase.map((w, i) => (
              <div className="phrase-chip" key={i}><span className="pc-i">{i + 1}</span><span className="mono">{w}</span></div>
            ))}
          </div>
          <label className="ack">
            <input type="checkbox" checked={ack} onChange={(e) => setAck(e.target.checked)} />
            <span>{T("sec.recoveryAck")}</span>
          </label>
          <button className="btn btn-primary btn-block btn-lg" disabled={!ack} style={{ opacity: ack ? 1 : .5 }} onClick={onUnlocked}>
            {T("sec.continue")} <Icon name="arrow" size={17} />
          </button>
        </div>
      )}

      {/* ---------- UNLOCK ---------- */}
      {mode === "unlock" && (
        <div className="animate">
          <div className="auth-icon"><Icon name="lock" size={22} /></div>
          <h1 className="auth-h">{T("sec.unlockTitle")}</h1>
          <p className="auth-p">{T("sec.unlockSub")}</p>
          <div className="field" style={{ marginBottom: 18 }}>
            <label>{T("sec.master")}</label>
            <PwField value={pw} onChange={setPw} placeholder="••••••••••••" autoFocus onEnter={doUnlock} />
          </div>
          {err && <div className="auth-err">{err}</div>}
          <button className="btn btn-primary btn-block btn-lg" onClick={doUnlock} disabled={busy}>
            {busy ? "…" : <>{T("sec.unlock")} <Icon name="unlock" size={17} /></>}
          </button>
          <button className="auth-link" onClick={() => { setErr(""); setPw(""); setMode("recover"); }}>
            {lang === "de" ? "Passwort vergessen? Phrase verwenden" : "Forgot password? Use recovery phrase"}
          </button>
          <div className="auth-foot-note"><Icon name="lock" size={14} /> {T("sec.autoLockNote")}</div>
        </div>
      )}

      {/* ---------- 2FA ---------- */}
      {mode === "twofa" && (
        <div className="animate">
          <div className="auth-icon"><Icon name="shield" size={22} /></div>
          <h1 className="auth-h">{T("sec.twoFa")}</h1>
          <p className="auth-p">{T("sec.twoFaSub")}</p>
          <input className="input mono otp" inputMode="numeric" maxLength={6} value={code} autoFocus
            placeholder="······" onChange={(e) => setCode(e.target.value.replace(/\D/g, "").slice(0, 6))}
            onKeyDown={(e) => e.key === "Enter" && doTwoFa()} />
          {err && <div className="auth-err" style={{ marginTop: 14 }}>{err}</div>}
          <button className="btn btn-primary btn-block btn-lg" style={{ marginTop: 18 }} onClick={doTwoFa}>
            {T("sec.verify")} <Icon name="check" size={17} />
          </button>
          <div className="auth-foot-note">{T("sec.demoHint")}: <b className="mono" style={{ color: "var(--ink-2)" }}>beliebige 6 Ziffern</b></div>
        </div>
      )}

      {/* ---------- RECOVER ---------- */}
      {mode === "recover" && (
        <div className="animate">
          <div className="auth-icon"><Icon name="key" size={22} /></div>
          <h1 className="auth-h">{T("sec.recoveryTitle")}</h1>
          <p className="auth-p">{lang === "de" ? "Gib deine 6-Wort-Phrase ein und setze ein neues Master-Passwort." : "Enter your 6-word phrase and set a new master password."}</p>
          <div className="field" style={{ marginBottom: 14 }}>
            <label>{T("sec.recoveryTitle")}</label>
            <textarea className="input mono" rows={2} value={recPhrase} placeholder="alpen anker birke …"
              onChange={(e) => setRecPhrase(e.target.value)} style={{ resize: "none" }} />
          </div>
          <div className="field" style={{ marginBottom: 18 }}>
            <label>{lang === "de" ? "Neues Master-Passwort" : "New master password"}</label>
            <PwField value={pw} onChange={setPw} placeholder="••••••••••••" onEnter={doRecover} />
          </div>
          {err && <div className="auth-err">{err}</div>}
          <button className="btn btn-primary btn-block btn-lg" onClick={doRecover} disabled={busy}>{T("sec.continue")}</button>
          <button className="auth-link" onClick={() => { setErr(""); setMode("unlock"); }}>{T("common.back")}</button>
        </div>
      )}
    </AuthShell>
  );
}

Object.assign(window, { AuthScreen, PwField });

  </script>

  <script type="text/babel" data-presets="react">
/* ============================================================
   CasaFin — Dashboard
   ============================================================ */
function StatTile({ k, icon, v, sub, dir, accent }) {
  return (
    <div className="stat">
      <div className="k"><Icon name={icon} size={15} /> {k}</div>
      <div className="v num">{v}</div>
      {sub && <div className={"measure-row " + (dir || "")} style={{ marginTop: 6 }}>
        {dir && <Icon name="budget" size={13} style={{ transform: dir === "down" ? "scaleY(-1)" : "none" }} />}
        <span>{sub}</span>
      </div>}
    </div>
  );
}

function Dashboard({ lang, go }) {
  const T = (k) => window.I18N.t(k, lang);
  const d = window.Vault.data, S = window.Vault.sel, F = window.fmt;
  const months = ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];
  const bars = d.netWorthSeries.slice(-6).map((v, i, a) => ({ label: months[6 + i], v, on: i === a.length - 1 }));
  const recent = [...d.transactions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5);
  const health = S.health();

  return (
    <div className="animate">
      <div className="grid cols-4" style={{ marginBottom: 18 }}>
        <StatTile k={T("dash.netWorth")} icon="chart" v={F.chf(S.netWorth())} sub={"+2.1% " + T("dash.thisMonth")} dir="up" />
        <StatTile k={T("dash.spendMonth") + " " + (lang === "de" ? "Mai" : "May")} icon="budget" v={F.chf(S.monthSpent())} sub={"+12% " + T("dash.vsLast")} dir="up" />
        <StatTile k={T("dash.deductions")} icon="docs" v={F.chf(2400)} sub={"+" + F.chf(600) + " " + T("dash.newFound")} dir="up" />
        <div className="stat" style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ position: "relative", width: 72, height: 72, flexShrink: 0 }}>
            <HealthRing value={health} size={72} stroke={8} />
            <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center" }}>
              <span className="num" style={{ fontWeight: 780, fontSize: 20 }}>{health}</span>
            </div>
          </div>
          <div>
            <div className="k"><Icon name="shield" size={15} /> {T("dash.health")}</div>
            <div style={{ fontSize: 13, color: "var(--ink-3)", marginTop: 6, fontWeight: 600 }}>{health >= 75 ? (lang === "de" ? "Sehr gut" : "Very good") : (lang === "de" ? "Solide" : "Solid")}</div>
          </div>
        </div>
      </div>

      <div className="grid" style={{ gridTemplateColumns: "1.55fr 1fr", alignItems: "start" }}>
        {/* LEFT */}
        <div className="grid">
          <div className="card card-pad">
            <div className="card-h">
              <h3>{T("dash.spending")}</h3>
              <span className="chip pos" style={{ marginLeft: "auto" }}>↑ {F.chf(36750)} · 12 Mt.</span>
            </div>
            <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 8 }}>
              <span className="num" style={{ fontSize: 30, fontWeight: 780, letterSpacing: "-.03em" }}>{F.chf(S.netWorth())}</span>
            </div>
            <NetWorthLine series={d.netWorthSeries} height={138} />
            <div style={{ marginTop: 10 }}><MiniBars data={bars} /></div>
          </div>

          <div className="card card-pad">
            <div className="card-h">
              <h3>{T("dash.recent")}</h3>
              <button className="more" onClick={() => go("budget")}>{T("common.viewAll")} <Icon name="chevron" size={14} /></button>
            </div>
            {recent.map((t) => (
              <div className="row" key={t.id}>
                <div className="ic">{t.icon}</div>
                <div>
                  <div className="nm">{t.title}</div>
                  <div className="sub">{t.category} · {F.date(t.date, lang)}</div>
                </div>
                <div className={"amt num " + (t.amount > 0 ? "up" : "")}>{F.chf(t.amount, { sign: t.amount > 0, dp: 2 })}</div>
              </div>
            ))}
          </div>
        </div>

        {/* RIGHT */}
        <div className="grid">
          {(() => {
            const nb = S.nextBill();
            if (!nb) return null;
            const dd = Math.round((new Date(nb.date || nb.due) - new Date().setHours(0,0,0,0)) / 864e5);
            const urgent = dd <= 5;
            return (
              <div className="card card-pad" style={{ background: urgent ? "var(--danger-soft)" : "var(--surface)", borderColor: urgent ? "transparent" : "var(--line)" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                  <div className="ic" style={{ fontSize: 18, background: "var(--surface)" }}>{nb.icon}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 680, fontSize: 14 }}>{nb.vendor}</div>
                    <div style={{ fontSize: 12, color: urgent ? "var(--neg)" : "var(--ink-3)", fontWeight: 600 }}>
                      {F.chf(nb.amount)} · {dd < 0 ? Math.abs(dd) + " " + (lang === "de" ? "T. überfällig" : "d overdue") : dd === 0 ? (lang === "de" ? "heute fällig" : "due today") : (lang === "de" ? "fällig in " : "due in ") + dd + " " + (lang === "de" ? "Tagen" : "days")}
                    </div>
                  </div>
                  <span className="chip" style={{ fontSize: 10.5, color: "var(--warn)" }}>{T("bills.next")}</span>
                </div>
                <button className="btn btn-ghost btn-block" style={{ fontSize: 13, padding: "9px" }} onClick={() => go("bills")}><Icon name="receipt" size={15} /> {T("nav.bills")}</button>
              </div>
            );
          })()}
          <div className="card card-pad" style={{ textAlign: "center" }}>
            <div className="card-h" style={{ justifyContent: "center" }}><h3>{T("dash.health")}</h3></div>
            <div style={{ position: "relative", width: 132, height: 132, margin: "4px auto 18px" }}>
              <HealthRing value={health} />
              <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", flexDirection: "column" }}>
                <span className="num" style={{ fontWeight: 800, fontSize: 34, lineHeight: 1 }}>{health}</span>
                <span style={{ fontSize: 11, color: "var(--ink-3)", fontWeight: 600 }}>/ 100</span>
              </div>
            </div>
            <Meter label={T("dash.savingsRate")} value={S.savingsRate()} />
            <Meter label={T("dash.budgetKept")} value={S.budgetKept()} />
          </div>

          <div className="card card-pad">
            <div className="card-h">
              <h3>{T("dash.myAccounts")}</h3>
              <button className="more" onClick={() => go("accounts")}>{T("common.viewAll")} <Icon name="chevron" size={14} /></button>
            </div>
            {d.accounts.slice(0, 4).map((a) => (
              <div className="row" key={a.id}>
                <div className="ic" style={{ fontSize: 12, fontWeight: 700, fontFamily: "var(--font-mono)" }}>{a.bank.slice(0, 2).toUpperCase()}</div>
                <div>
                  <div className="nm">{a.label}</div>
                  <div className="sub">{a.bank} · {T("acc.type." + a.type)}</div>
                </div>
                <div className={"amt num " + (a.balance < 0 ? "down" : "")}>{F.chf(a.balance)}</div>
              </div>
            ))}
          </div>

          <div className="card card-pad fina-cta">
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
              <div className="fina-orb"><Icon name="sparkle" size={16} /></div>
              <div><div style={{ fontWeight: 720, fontSize: 15 }}>Fina</div><div style={{ fontSize: 11.5, color: "var(--ink-3)" }}>{T("fina.role")}</div></div>
            </div>
            <p style={{ fontSize: 13.5, color: "var(--ink-2)", lineHeight: 1.5, marginBottom: 14 }}>{T("dash.finaPreview")}</p>
            <button className="btn btn-primary btn-block" onClick={() => go("fina")}><Icon name="sparkle" size={16} /> {T("dash.askFina")}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Meter({ label, value }) {
  return (
    <div style={{ textAlign: "left", marginTop: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, marginBottom: 6 }}>
        <span style={{ color: "var(--ink-2)", fontWeight: 600 }}>{label}</span>
        <span className="num" style={{ fontWeight: 700 }}>{value}%</span>
      </div>
      <div className="bar"><i style={{ width: value + "%" }} /></div>
    </div>
  );
}

Object.assign(window, { Dashboard, StatTile, Meter });

  </script>

  <script type="text/babel" data-presets="react">
/* ============================================================
   CasaFin — Accounts
   ============================================================ */
const { useState: useStateAc } = React;

const BANKS = ["PostFinance", "ZKB", "UBS", "Raiffeisen", "VIAC", "Swisscard", "Cembra", "Bob Finance", "Migros Bank", "Neon", "Yuh", "Andere / Other"];
const ACC_TYPES = ["checking", "savings", "securities", "pillar", "card", "loan", "mortgage"];
const LIABILITY = ["card", "loan", "mortgage"];

function Accounts({ lang }) {
  const T = (k) => window.I18N.t(k, lang);
  const d = window.Vault.data, S = window.Vault.sel, F = window.fmt;
  const [add, setAdd] = useStateAc(false);
  const [owner, setOwner] = useStateAc("all");
  const [form, setForm] = useStateAc({ bank: "PostFinance", label: "", type: "checking", balance: "", monthly: "", owner: "you" });
  const isLiab = LIABILITY.includes(form.type);
  const accs = owner === "all" ? d.accounts : d.accounts.filter((a) => a.owner === owner);
  const OWNERS = [
    { value: "all", label: T("acc.allOwners") },
    { value: "you", label: T("acc.owner.you") },
    { value: "partner", label: T("acc.owner.partner") },
    { value: "joint", label: T("acc.owner.joint") },
  ];
  const ownerChip = { you: "var(--brand-soft)", partner: "var(--gold-soft)", joint: "var(--surface-3)" };

  function submit() {
    const bal = parseFloat(String(form.balance).replace(/['’]/g, "")) || 0;
    const mon = parseFloat(String(form.monthly).replace(/['’]/g, "")) || 0;
    const id = "a" + Date.now();
    window.Vault.update((data) => {
      data.accounts.push({ id, bank: form.bank, label: form.label || form.bank, type: form.type, owner: form.owner,
        iban: (form.type === "card" ? "····  ····  " : "CH·····") + Math.floor(1000 + Math.random() * 8999),
        balance: isLiab ? -Math.abs(bal) : bal,
        monthly: mon || undefined,
        status: form.type === "pillar" ? "locked" : "active" });
      window.Vault.log("account.added", form.bank + " · " + (form.label || form.type));
    });
    setAdd(false);

/* ============================================================
   CasaFin — Budget & Charts
   ============================================================ */
const { useState: useStateB } = React;

function Budget({ lang }) {
  const T = (k) => window.I18N.t(k, lang);
  const d = window.Vault.data, S = window.Vault.sel, F = window.fmt;
  const [edit, setEdit] = useStateB(null); // category id being edited
  const [val, setVal] = useStateB("");
  const [txOpen, setTxOpen] = useStateB(false);
  const [tx, setTx] = useStateB({ kind: "expense", title: "", category: "", amount: "", date: new Date().toISOString().slice(0, 10) });

  const cats = d.budget.categories;
  const spent = S.monthSpent(), budget = S.monthBudget();
  const income = S.income();
  const saved = income - spent;

  function saveBudget(id) {
    const n = parseFloat(String(val).replace(/'/g, "")) || 0;
    window.Vault.update((data) => {
      const c = data.budget.categories.find((x) => x.id === id);
      if (c) c.budget = n;
      window.Vault.log("budget.edited", c.name + " → " + n);
    });
    setEdit(null); setVal("");
  }

  const catIcons = { Wohnen: "🏠", Lebensmittel: "🛒", Transport: "🚆", Freizeit: "🍽️", Abos: "📱", Nebenkosten: "⚡", Einkommen: "💰" };
  function saveTx() {
    const amt = Math.abs(parseFloat(String(tx.amount).replace(/['’]/g, "")) || 0);
    if (!amt) return;
    const isInc = tx.kind === "income";
    const cat = isInc ? "Einkommen" : (tx.category || (cats[0] && cats[0].name) || "Sonstiges");
    window.Vault.addTransaction({
      id: "t" + Date.now(), accountId: null,
      title: tx.title || (isInc ? "Einnahme" : cat), category: cat,
      date: tx.date, amount: isInc ? amt : -amt,
      icon: isInc ? "💰" : (catIcons[cat] || "💳"),
    });
    setTxOpen(false);
    setTx({ kind: "expense", title: "", category: "", amount: "", date: new Date().toISOString().slice(0, 10) });
  }

  return (
    <div className="animate">
      <div className="screen-toolbar">
        <span className="seclabel"><Icon name="budget" size={12} /> {F.chf(spent)} {T("bud.of")} {F.chf(budget)}</span>
        <button className="btn btn-primary" style={{ marginLeft: "auto" }} onClick={() => setTxOpen(true)}><Icon name="plus" size={16} /> {T("bud.addTx")}</button>
        <div className="seg" style={{ marginLeft: 0 }}><button>‹</button><button className="on">{lang === "de" ? "Mai 2026" : "May 2026"}</button><button>›</button></div>
      </div>

      <div className="grid cols-3" style={{ marginBottom: 18 }}>
        <div className="stat"><div className="k"><Icon name="budget" size={15} /> {T("bud.income")}</div><div className="v num up" style={{ fontSize: 24 }}>{F.chf(income)}</div></div>
        <div className="stat"><div className="k"><Icon name="budget" size={15} style={{ transform: "scaleY(-1)" }} /> {T("bud.expenses")}</div><div className="v num" style={{ fontSize: 24 }}>{F.chf(spent)}</div></div>
        <div className="stat"><div className="k"><Icon name="shield" size={15} /> {T("bud.saved")}</div><div className="v num" style={{ fontSize: 24, color: "var(--brand)" }}>{F.chf(saved)}</div><div className="s">{S.savingsRate()}% {T("dash.savingsRate")}</div></div>
      </div>

      <div className="grid" style={{ gridTemplateColumns: "1fr 1.5fr", alignItems: "start" }}>
        <div className="card card-pad" style={{ textAlign: "center" }}>
          <div className="card-h" style={{ justifyContent: "center" }}><h3>{T("bud.byCategory")}</h3></div>
          <div style={{ position: "relative", width: 180, height: 180, margin: "6px auto 20px" }}>
            <CategoryDonut categories={cats} />
            <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", flexDirection: "column" }}>
              <span style={{ fontSize: 11, color: "var(--ink-3)", fontWeight: 600 }}>{T("bud.spent")}</span>
              <span className="num" style={{ fontWeight: 800, fontSize: 23 }}>{F.chf(spent)}</span>
            </div>
          </div>
          <div style={{ display: "grid", gap: 9 }}>
            {cats.map((c, i) => (
              <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 9, fontSize: 13 }}>
                <span style={{ width: 10, height: 10, borderRadius: 3, background: window.DONUT_COLORS[i % 6] }} />
                <span style={{ fontWeight: 600 }}>{c.name}</span>
                <span className="num" style={{ marginLeft: "auto", color: "var(--ink-2)", fontWeight: 650 }}>{F.chf(c.spent)}</span>
              </div>
            ))}
          </div>
        </div>

        <div className="card card-pad">
          <div className="card-h"><h3>{T("bud.categories")}</h3><span className="eyebrow" style={{ marginLeft: "auto" }}>{lang === "de" ? "Klick zum Anpassen" : "Click to adjust"}</span></div>
          <div style={{ display: "grid", gap: 16 }}>
            {cats.map((c) => {
              const pct = Math.min(100, Math.round((c.spent / c.budget) * 100));
              const over = c.spent > c.budget;
              return (
                <div key={c.id}>
                  <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 8 }}>
                    <div className="ic" style={{ width: 34, height: 34, fontSize: 15 }}>{c.icon}</div>
                    <div style={{ fontWeight: 640, fontSize: 14 }}>{c.name}</div>
                    <div className="num" style={{ marginLeft: "auto", fontWeight: 700, fontSize: 14 }}>
                      {F.chf(c.spent)} <span style={{ color: "var(--ink-3)", fontWeight: 500 }}>/ {edit === c.id ? "" : F.chf(c.budget)}</span>
                      {edit === c.id && (
                        <input className="input num" autoFocus value={val} placeholder={String(c.budget)}
                          onChange={(e) => setVal(e.target.value)} onKeyDown={(e) => e.key === "Enter" && saveBudget(c.id)} onBlur={() => saveBudget(c.id)}
                          style={{ width: 90, display: "inline-block", padding: "4px 8px", marginLeft: 4 }} />
                      )}
                    </div>
                    {edit !== c.id && <button className="mini-edit" onClick={() => { setEdit(c.id); setVal(String(c.budget)); }}><Icon name="settings" size={14} /></button>}
                  </div>
                  <div className="bar" style={{ height: 9 }}><i style={{ width: pct + "%", background: over ? "var(--neg)" : "var(--brand)" }} /></div>
                  <div style={{ display: "flex", justifyContent: "space-between", marginTop: 5, fontSize: 11.5, color: over ? "var(--neg)" : "var(--ink-3)", fontWeight: 600 }}>
                    <span>{pct}%</span>
                    <span>{over ? F.chf(c.spent - c.budget) + " " + T("bud.over") : F.chf(c.budget - c.spent) + " " + T("bud.left")}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <Modal open={txOpen} onClose={() => setTxOpen(false)} title={T("bud.addTx")}
        footer={<><button className="btn btn-ghost" onClick={() => setTxOpen(false)}>{T("common.cancel")}</button>
          <button className="btn btn-primary" onClick={saveTx}>{T("common.add")}</button></>}>
        <div className="field" style={{ marginBottom: 14 }}>
          <label>{T("tx.kind")}</label>
          <Segmented value={tx.kind} onChange={(v) => setTx({ ...tx, kind: v })}
            options={[{ value: "expense", label: T("tx.expense") }, { value: "income", label: T("tx.income") }]} />
        </div>
        <div className="field" style={{ marginBottom: 14 }}>
          <label>{T("tx.title")}</label>
          <input className="input" value={tx.title} placeholder={lang === "de" ? "z.B. Coop, Miete, Lohn" : "e.g. groceries, rent, salary"} onChange={(e) => setTx({ ...tx, title: e.target.value })} />
        </div>
        <div className="grid cols-2" style={{ gap: 14 }}>
          <div className="field">
            <label>{T("tx.amount")}</label>
            <input className="input num" inputMode="decimal" value={tx.amount} placeholder="0" onChange={(e) => setTx({ ...tx, amount: e.target.value })} />
          </div>
          <div className="field">
            <label>{T("tx.date")}</label>
            <input className="input" type="date" value={tx.date} onChange={(e) => setTx({ ...tx, date: e.target.value })} />
          </div>
        </div>
        {tx.kind === "expense" && (
          <div className="field" style={{ marginTop: 14 }}>
            <label>{T("docs.category")}</label>
            <select className="input" value={tx.category} onChange={(e) => setTx({ ...tx, category: e.target.value })}>
              {cats.map((c) => <option key={c.id} value={c.name}>{c.icon} {c.name}</option>)}
            </select>
          </div>
        )}
        <div className="seclabel" style={{ marginTop: 18 }}><Icon name="lock" size={12} /> {T("sec.encrypted")}</div>
      </Modal>
    </div>
  );
}

window.Budget = Budget;

  </script>

  <script type="text/babel" data-presets="react">
/* ============================================================
   CasaFin — Fina (AI copilot, scripted over real data)
   ============================================================ */
const { useState: useStateF, useRef: useRefF, useEffect: useEffectF } = React;

function finaAnswer(q, lang) {
  const S = window.Vault.sel, F = window.fmt;
  const t = q.toLowerCase();
  const income = S.income(), spent = S.monthSpent(), saved = income - spent;
  const de = lang === "de";

  // car / afford
  const m = t.match(/(\d[\d'’.]{2,})/);
  if (/(auto|car|leist|afford|kauf|buy)/.test(t)) {
    const price = m ? parseFloat(m[1].replace(/['’.]/g, "")) : 35000;
    const monthly = Math.round(price / 48);
    const pct = Math.round((monthly / saved) * 100);
    return de
      ? `Basierend auf deinen Daten sparst du aktuell rund **${F.chf(saved)}/Monat**. Bei einer Finanzierung von ${F.chf(price)} über 48 Monate wären das ca. **${F.chf(monthly)}/Mt.** — das entspricht **${pct}% deiner Sparquote**. Tragbar, aber ich würde maximal 40% empfehlen. Soll ich dir die Auswirkung aufs Budget zeigen?`
      : `Based on your data you currently save about **${F.chf(saved)}/month**. Financing ${F.chf(price)} over 48 months is roughly **${F.chf(monthly)}/mo** — that's **${pct}% of your savings rate**. Affordable, but I'd keep it under 40%. Want me to show the budget impact?`;
  }
  // pillar 3a
  if (/(säule|saule|3a|pillar|vorsorge|pension)/.test(t)) {
    const headroom = 4342, taxSave = "CHF 800–1'200";
    return de
      ? `Du hast dieses Jahr noch **${F.chf(headroom)}** Spielraum für die 3. Säule (Max. 2026: CHF 7'056). Eine Maximaleinzahlung würde deine Steuerrechnung in Kanton Zürich um geschätzt **${taxSave}** senken — je nach Einkommen.`
      : `You still have **${F.chf(headroom)}** of pillar 3a headroom this year (2026 max: CHF 7,056). Contributing the maximum would cut your Zurich tax bill by an estimated **${taxSave}** — depending on income.`;
  }
  // tax
  if (/(steuer|tax|abzug|deduction)/.test(t)) {
    return de
      ? `Ich habe für 2025 (Kanton Zürich) **${F.chf(2400)}** an Abzügen erkannt — inkl. Berufsauslagen und Versicherungsprämien. **${F.chf(1200)}** zusätzliche Abzüge sind noch möglich. CasaTax bereitet alles für deinen Treuhänder vor.`
      : `For 2025 (Canton Zurich) I've identified **${F.chf(2400)}** in deductions — including professional expenses and insurance premiums. **${F.chf(1200)}** of additional deductions are still possible. CasaTax prepares everything for your trustee.`;
  }
  // save more / overview
  if (/(spar|save|mehr|more|budget|ausgeb|spend|überblick|overview)/.test(t)) {
    const top = [...window.Vault.data.budget.categories].sort((a, b) => b.spent - a.spent)[0];
    const over = window.Vault.data.budget.categories.filter((c) => c.spent > c.budget);
    return de
      ? `Diesen Monat hast du **${F.chf(spent)}** ausgegeben bei **${F.chf(income)}** Einnahmen — Sparquote **${S.savingsRate()}%**. Grösster Posten: ${top.name} (${F.chf(top.spent)}).${over.length ? ` Über Budget: ${over.map(c => c.name).join(", ")}.` : ""} Reduziere «Freizeit» um CHF 100 und du sparst CHF 1'200/Jahr extra.`
      : `This month you spent **${F.chf(spent)}** on **${F.chf(income)}** income — savings rate **${S.savingsRate()}%**. Biggest category: ${top.name} (${F.chf(top.spent)}).${over.length ? ` Over budget: ${over.map(c => c.name).join(", ")}.` : ""} Trim "Freizeit" by CHF 100 and you'd save an extra CHF 1,200/year.`;
  }
  // net worth
  if (/(vermögen|vermogen|net worth|worth|reich|wealth)/.test(t)) {
    return de
      ? `Dein Gesamtvermögen liegt bei **${F.chf(S.netWorth())}** — ${F.chf(S.liquid())} liquid, ${F.chf(S.invest())} investiert, ${F.chf(S.pillar())} in der 3. Säule. Trend: +2.1% diesen Monat. 📈`
      : `Your net worth is **${F.chf(S.netWorth())}** — ${F.chf(S.liquid())} liquid, ${F.chf(S.invest())} invested, ${F.chf(S.pillar())} in pillar 3a. Trend: +2.1% this month. 📈`;
  }
  // default
  return de
    ? `Gute Frage. Auf Basis deiner Daten: Vermögen **${F.chf(S.netWorth())}**, Sparquote **${S.savingsRate()}%**, Finanzgesundheit **${S.health()}/100**. Frag mich z.B. nach Steuerabzügen, deiner 3. Säule oder ob du dir etwas leisten kannst.`
    : `Good question. From your data: net worth **${F.chf(S.netWorth())}**, savings rate **${S.savingsRate()}%**, financial health **${S.health()}/100**. Ask me about tax deductions, your pillar 3a, or whether you can afford something.`;
}

function renderMd(s) {
  const parts = s.split(/(\*\*[^*]+\*\*)/g);
  return parts.map((p, i) => p.startsWith("**") ? <b key={i}>{p.slice(2, -2)}</b> : <span key={i}>{p}</span>);
}

function Fina({ lang }) {
  const T = (k) => window.I18N.t(k, lang);
  const F = window.fmt;
  const suggested = lang === "de"
    ? ["Kann ich mir ein Auto für CHF 35'000 leisten?", "Wie viel kann ich in die 3. Säule einzahlen?", "Wo gebe ich zu viel aus?", "Welche Steuerabzüge habe ich?"]
    : ["Can I afford a car for CHF 35,000?", "How much can I add to pillar 3a?", "Where do I overspend?", "What tax deductions do I have?"];
  const [msgs, setMsgs] = useStateF([{ from: "fina", text: T("fina.intro") }]);
  const [input, setInput] = useStateF("");
  const [thinking, setThinking] = useStateF(false);
  const scrollRef = useRefF(null);

  useEffectF(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [msgs, thinking]);

  function ask(text) {
    const q = (text ?? input).trim();
    if (!q || thinking) return;
    setMsgs((m) => [...m, { from: "me", text: q }]);
    setInput("");
    setThinking(true);
    setTimeout(() => {
      setThinking(false);
      setMsgs((m) => [...m, { from: "fina", text: finaAnswer(q, lang) }]);
    }, 850);
  }

  const actions = lang === "de"
    ? [{ icon: "💳", t: "Krankenkasse AXA fällig", d: "CHF 420 in 3 Tagen — automatische Zahlung einrichten.", v: "CHF 420", u: true },
       { icon: "📋", t: "Steuerabzüge optimieren", d: "CHF 1'200 zusätzliche Abzüge möglich — Kt. Zürich 2025.", v: "+CHF 1'200", u: false },
       { icon: "💡", t: "Freizeit über Budget", d: "CHF 112 über dem Monatsbudget — Tendenz steigend.", v: "−CHF 112", u: false }]
